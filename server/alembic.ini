# Alembic config for the G1N persistent schema.
# This file lives under server/ so that ``alembic`` commands can
# be run from the server/ directory.

[alembic]
script_location = migrations
prepend_sys_path = .
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# The DSN is overridden at runtime by migrations/env.py from
# the G1N_DB_URL environment variable.  The default here matches
# the local SQLite file used by `db.init_db()`.
sqlalchemy.url = sqlite:///./data/g1n.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
