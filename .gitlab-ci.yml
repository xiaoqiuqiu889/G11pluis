# 《革命街没有尽头》· AI 原生重构 — 决策 6 + 决策 4 落成
#
# GitLab CI equivalent of .github/workflows/four-questions.yml.
# The brief is GitHub-first, but this file is here for projects that
# live on GitLab (e.g. for the parallel integration lane).
#
# 三个 stage:
#   guard      - four-questions-guard (决策 6, content-only)
#   v6-scan    - v6_residual_scan (P0-1, P0-8, decision 4 red line)
#   test       - full adversarial suite + content-studio smoke
#
# 工具位置说明（与决策红线）：
#   * 此文件在项目根（`.gitlab-ci.yml`）— GitLab CI 标准位置
#   * 旧位置 `tools/ci/.gitlab-ci.yml` 已废弃（见 tools/ci/README.md）

stages:
  - guard
  - v6-scan
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: "$CI_PROJECT_DIR"

cache:
  key:
    files:
      - tools/four_questions_guard_lib.py
  paths:
    - .cache/pip

default:
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install pyyaml pytest coverage fastapi uvicorn httpx

# ---------------------------------------------------------------------------
# 决策 6 工具：4 项自检
# ---------------------------------------------------------------------------
four-questions-guard:
  stage: guard
  rules:
    - changes:
        - content/**/scenes/*
        - tools/four-questions-guard.py
        - tools/four_questions_guard_lib.py
        - tests/adversarial/test_four_questions_guard.py
  script:
    # 1) Unit tests for the guard itself.
    - python -m pytest tests/adversarial/test_four_questions_guard.py --tb=short
    # 2) Find every scene YAML and run the guard.
    - |
      set -e
      SCENES=$(find content -path '*/scenes/*' \( -name '*.yaml' -o -name '*.yml' \) -print)
      if [ -z "$SCENES" ]; then
        echo "no scene files found"
        exit 0
      fi
      set -x
      python tools/four-questions-guard.py --human $SCENES
  allow_failure: false

# ---------------------------------------------------------------------------
# 决策 4 红线：v6 残留扫描（P0-1, P0-8）
# ---------------------------------------------------------------------------
v6-residual-scan:
  stage: v6-scan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - python tools/v6_residual_scan.py --root "$CI_PROJECT_DIR" --human
    # Exit code 0 = clean; non-zero = blocker.
  allow_failure: false

# ---------------------------------------------------------------------------
# 决策 6 + 5：全量对抗测试
# ---------------------------------------------------------------------------
adversarial-tests:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - python -m pytest tests/adversarial/ --tb=short -v
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+)%/'
  artifacts:
    when: always
    paths:
      - .coverage
      - htmlcov/
    expire_in: 7 days
