<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>content-studio · 《革命街没有尽头》</title>
<style>
  :root {
    --bg: #1a1a1f;
    --bg-elev: #23232b;
    --bg-elev-2: #2c2c36;
    --fg: #e4e4eb;
    --fg-dim: #9a9aa8;
    --accent: #6ee7b7;
    --accent-dim: #34d399;
    --warn: #fbbf24;
    --error: #f87171;
    --border: #3a3a45;
    --mono: "SF Mono", Menlo, Consolas, "Courier New", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
            "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }
  header .sub {
    color: var(--fg-dim);
    font-size: 12px;
  }
  header .spacer { flex: 1; }
  header .badge {
    font-family: var(--mono);
    font-size: 12px;
    padding: 2px 8px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--fg-dim);
  }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr 380px;
    min-height: 0;
  }
  .panel {
    overflow: auto;
    border-right: 1px solid var(--border);
    background: var(--bg-elev);
  }
  .panel:last-child { border-right: none; }
  .panel h2 {
    margin: 0;
    padding: 12px 16px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg-dim);
    background: var(--bg-elev-2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .panel-content { padding: 12px 16px; }

  /* file tree */
  .case-block { margin-bottom: 12px; }
  .case-name {
    font-weight: 600;
    color: var(--accent);
    font-size: 13px;
    margin-bottom: 4px;
  }
  .file-list { list-style: none; padding: 0; margin: 0; }
  .file-list li {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 3px;
    color: var(--fg-dim);
  }
  .file-list li:hover { background: var(--bg-elev-2); color: var(--fg); }
  .file-list li.active { background: var(--bg-elev-2); color: var(--accent); }

  /* editor */
  textarea {
    width: 100%;
    height: calc(100vh - 110px);
    border: none;
    outline: none;
    resize: none;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 16px 24px;
    tab-size: 2;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg-elev-2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  button {
    font-family: var(--sans);
    font-size: 12px;
    padding: 6px 14px;
    background: var(--bg-elev);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--bg); }
  button.primary {
    background: var(--accent);
    color: #0a1f17;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover { background: var(--accent-dim); }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* guard panel */
  .guard-summary {
    padding: 16px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
  }
  .guard-summary.pass { background: rgba(110, 231, 183, 0.15); color: var(--accent); border: 1px solid var(--accent); }
  .guard-summary.block { background: rgba(248, 113, 113, 0.15); color: var(--error); border: 1px solid var(--error); }
  .guard-summary.idle { background: var(--bg-elev-2); color: var(--fg-dim); border: 1px solid var(--border); }
  .check-list { list-style: none; padding: 0; margin: 0; }
  .check-item {
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 4px;
    background: var(--bg-elev-2);
    border-left: 3px solid var(--border);
  }
  .check-item.passed { border-left-color: var(--accent); }
  .check-item.failed { border-left-color: var(--error); }
  .check-item.skipped { border-left-color: var(--fg-dim); opacity: 0.7; }
  .check-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
  }
  .check-mark {
    width: 18px;
    text-align: center;
    font-family: var(--mono);
  }
  .check-detail {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--border);
    color: var(--fg-dim);
    font-size: 12px;
    font-family: var(--mono);
    white-space: pre-wrap;
    display: none;
  }
  .check-item.expanded .check-detail { display: block; }
  .check-evidence {
    margin-top: 6px;
    color: var(--fg-dim);
    font-size: 11px;
    font-family: var(--mono);
    white-space: pre-wrap;
    display: none;
  }
  .check-item.expanded .check-evidence { display: block; }
  .evidence-item { margin-left: 8px; }
  .check-id { color: var(--accent); font-family: var(--mono); font-size: 11px; }

  /* blocking reasons */
  .block-list {
    background: rgba(248, 113, 113, 0.08);
    border: 1px solid var(--error);
    border-radius: 4px;
    padding: 8px 12px;
    margin-bottom: 16px;
    list-style: none;
  }
  .block-list li {
    color: var(--error);
    font-size: 12px;
    font-family: var(--mono);
    margin: 4px 0;
  }

  .empty {
    padding: 24px 16px;
    text-align: center;
    color: var(--fg-dim);
    font-size: 13px;
  }

  .toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 16px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--fg);
    font-size: 12px;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--error); color: var(--error); }
  .toast.success { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>content-studio</h1>
  <span class="sub">《革命街没有尽头》· AI 原生重构 · 4 项自检</span>
  <span class="spacer"></span>
  <span class="badge" id="api-status">API: …</span>
</header>
<main>
  <section class="panel" id="left-panel">
    <h2>文件</h2>
    <div class="panel-content" id="file-tree">
      <p class="empty">加载中…</p>
    </div>
  </section>

  <section class="panel" id="center-panel" style="padding:0;">
    <h2 style="position:sticky;top:0;z-index:2;margin:0;">编辑器</h2>
    <div class="toolbar">
      <button id="btn-load" disabled>重新加载</button>
      <button id="btn-guard" class="primary" disabled>运行 4 项自检</button>
      <button id="btn-save" disabled>保存</button>
      <span class="spacer" style="flex:1;"></span>
      <span id="current-path" style="color:var(--fg-dim);font-family:var(--mono);font-size:12px;"></span>
    </div>
    <textarea id="editor" placeholder="从左侧选择一个场景合同开始编辑…
支持的类型：
  · 场景合同 (narrative_contract.yaml)
  · 互动 (player_action / npc_proposal / resolver_outcome)
保存时自动跑 4 项自检；不通过则会在 CI 阻断 PR。" spellcheck="false"></textarea>
  </section>

  <section class="panel" id="right-panel">
    <h2>4 项自检结果</h2>
    <div class="panel-content" id="guard-panel">
      <div class="guard-summary idle" id="guard-summary">
        等待运行…
      </div>
      <ul class="block-list" id="block-list" style="display:none;"></ul>
      <ul class="check-list" id="check-list"></ul>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

const state = {
  cases: [],
  currentPath: null,
  originalText: '',
  guardResult: null,
};

// ---------------------------------------------------------------------------
// DOM
// ---------------------------------------------------------------------------
const $ = (id) => document.getElementById(id);
const fileTree = $('file-tree');
const editor = $('editor');
const currentPathEl = $('current-path');
const guardSummary = $('guard-summary');
const blockList = $('block-list');
const checkList = $('check-list');
const apiStatus = $('api-status');
const btnLoad = $('btn-load');
const btnGuard = $('btn-guard');
const btnSave = $('btn-save');
const toast = $('toast');

// ---------------------------------------------------------------------------
// Toast helper
// ---------------------------------------------------------------------------
let toastTimer = null;
function showToast(msg, kind = '') {
  toast.textContent = msg;
  toast.className = 'toast show ' + kind;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ---------------------------------------------------------------------------
// API helpers
// ---------------------------------------------------------------------------
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    let detail = res.statusText;
    try {
      const body = await res.json();
      detail = body.detail || JSON.stringify(body);
    } catch (_) { /* swallow */ }
    throw new Error(`${res.status} ${detail}`);
  }
  return res.json();
}

// ---------------------------------------------------------------------------
// File tree
// ---------------------------------------------------------------------------
function renderFileTree() {
  if (!state.cases.length) {
    fileTree.innerHTML = '<p class="empty">content/ 下没有可用 case</p>';
    return;
  }
  fileTree.innerHTML = state.cases.map((c) => {
    const files = c.scenes.length
      ? `<ul class="file-list">${c.scenes.map((s) => (
          `<li data-path="${s}" class="${s === state.currentPath ? 'active' : ''}">${s.split('/').pop()}</li>`
        )).join('')}</ul>`
      : '<p class="empty">该 case 下没有场景</p>';
    return `<div class="case-block">
      <div class="case-name">${c.id}</div>
      ${files}
    </div>`;
  }).join('');
  // wire up clicks
  fileTree.querySelectorAll('li[data-path]').forEach((el) => {
    el.addEventListener('click', () => loadFile(el.dataset.path));
  });
}

async function refreshFileTree() {
  try {
    const data = await api('/api/cases');
    state.cases = data.cases || [];
    renderFileTree();
  } catch (err) {
    fileTree.innerHTML = `<p class="empty" style="color:var(--error);">加载文件树失败: ${err.message}</p>`;
  }
}

// ---------------------------------------------------------------------------
// File load / save
// ---------------------------------------------------------------------------
async function loadFile(path) {
  try {
    const data = await api(`/api/file?path=${encodeURIComponent(path)}`);
    state.currentPath = path;
    state.originalText = data.text;
    editor.value = data.text;
    currentPathEl.textContent = path;
    btnLoad.disabled = false;
    btnGuard.disabled = false;
    btnSave.disabled = false;
    renderFileTree();
    // auto-run guard on load
    runGuard();
    showToast('已加载 ' + path, 'success');
  } catch (err) {
    showToast('加载失败: ' + err.message, 'error');
  }
}

async function runGuard() {
  if (!state.currentPath) return;
  try {
    const result = await api('/api/guard-text', {
      method: 'POST',
      body: JSON.stringify({ text: editor.value, filename: state.currentPath }),
    });
    state.guardResult = result;
    renderGuard(result);
  } catch (err) {
    showToast('运行自检失败: ' + err.message, 'error');
  }
}

async function saveFile() {
  if (!state.currentPath) return;
  try {
    const result = await api('/api/save', {
      method: 'POST',
      body: JSON.stringify({ path: state.currentPath, text: editor.value }),
    });
    state.originalText = editor.value;
    state.guardResult = result.guard;
    renderGuard(result.guard);
    if (result.guard.blocking) {
      showToast('已保存（但 4 项自检未通过 — 提交前请修复）', 'error');
    } else {
      showToast('已保存且 4 项自检通过', 'success');
    }
  } catch (err) {
    showToast('保存失败: ' + err.message, 'error');
  }
}

// ---------------------------------------------------------------------------
// Guard rendering
// ---------------------------------------------------------------------------
function renderGuard(report) {
  // summary
  guardSummary.className = 'guard-summary ' + (report.blocking ? 'block' : 'pass');
  if (report.blocking) {
    const n = (report.blocking_reasons || []).length;
    guardSummary.textContent = `❌ 阻断（${n} 项）— ${report.document_kind}`;
  } else {
    const s = report.summary || {};
    guardSummary.textContent = `✅ 通过 — ${s.passed || 0} 项已检 / ${s.failed || 0} 失败 / ${s.skipped || 0} 跳过`;
  }

  // blocking reasons
  if (report.blocking && report.blocking_reasons && report.blocking_reasons.length) {
    blockList.style.display = 'block';
    blockList.innerHTML = report.blocking_reasons.map((r) => `<li>${r}</li>`).join('');
  } else {
    blockList.style.display = 'none';
    blockList.innerHTML = '';
  }

  // check list
  checkList.innerHTML = (report.results || []).map((r) => {
    const isSkipped = (r.detail || '').startsWith('skipped');
    const cls = r.passed ? (isSkipped ? 'skipped' : 'passed') : 'failed';
    const mark = r.passed ? (isSkipped ? '—' : '✓') : '✗';
    const evidence = (r.evidence || []).slice(0, 5).map((e) =>
      `<div class="evidence-item">· ${e}</div>`).join('');
    const more = (r.evidence || []).length > 5
      ? `<div class="evidence-item">· … (${r.evidence.length - 5} more)</div>` : '';
    return `<li class="check-item ${cls}" data-id="${r.id}">
      <div class="check-header">
        <span class="check-mark">${mark}</span>
        <span class="check-id">${r.id}</span>
        <span>${r.label}</span>
      </div>
      <div class="check-detail">${r.detail || ''}</div>
      <div class="check-evidence">${evidence}${more}</div>
    </li>`;
  }).join('');
  // expand on click
  checkList.querySelectorAll('.check-item').forEach((el) => {
    el.querySelector('.check-header').addEventListener('click', () => {
      el.classList.toggle('expanded');
    });
  });
}

// ---------------------------------------------------------------------------
// Wire up
// ---------------------------------------------------------------------------
btnLoad.addEventListener('click', () => {
  if (state.currentPath) loadFile(state.currentPath);
});
btnGuard.addEventListener('click', runGuard);
btnSave.addEventListener('click', saveFile);

// Ctrl/Cmd-S saves; Ctrl/Cmd-G runs guard
editor.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveFile();
  } else if ((e.ctrlKey || e.metaKey) && e.key === 'g') {
    e.preventDefault();
    runGuard();
  }
});

// ---------------------------------------------------------------------------
// Bootstrap
// ---------------------------------------------------------------------------
async function init() {
  try {
    const health = await api('/api/health');
    apiStatus.textContent = `API: ok · guard ${health.guard_version}`;
    apiStatus.style.color = 'var(--accent)';
  } catch (err) {
    apiStatus.textContent = 'API: 离线';
    apiStatus.style.color = 'var(--error)';
    showToast('无法连接 content-studio 后端: ' + err.message, 'error');
    return;
  }
  await refreshFileTree();
}

init();
</script>
</body>
</html>
