# -----------------------------------------------------------------------------
# 因果种子：本场景行为触发哪些（这里是收束种子，但仍有近端回响）
# -----------------------------------------------------------------------------
causal_seeds:
  - id: photo_pairing_complete
    description: 莱拉与阿拉什在咖啡桌上对齐两张同版毕业照
    trigger: 玩家对 graduation_photo_leila + graduation_photo_arash + coffee_table 执行 give
    effects:
      - 锚点 1 桌面上出现两张照片，磨损边角不同
      - 锚点 2 后续镜头停在照片的边角而非两个人的脸

  - id: photo_placement_decision
    description: 莱拉在糖罐旁把照片正面 / 反面 / 收回
    trigger: 玩家对 graduation_photo_leila 执行 give_to_table / give_to_self
    effects:
      - 锚点 1 镜头语言根据放置方式而变化（呼应 photo 共鸣操作的 3 个选项）

  - id: gaze_target_recalled
    description: 莱拉第一眼的焦点（手与白发 / 诗集 / 时钟与机场方向）
    trigger: 玩家对 hand_grey_hair / poetry_book / cafe_clock 执行 investigate
    effects:
      - 锚点 1 后续镜头语言由 gaze 选择决定
      - 锚点 2 13 年先落在指节 / 书脊 / 秒针

  - id: kamran_name_spoken_finally
    description: 莱拉在路口把"卡姆兰正在等我"说出口
