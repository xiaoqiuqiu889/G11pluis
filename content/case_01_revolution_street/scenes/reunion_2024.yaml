# -----------------------------------------------------------------------------
# 必触发回响（决策 3 显式登记；AI 导演不能自由发挥）
# -----------------------------------------------------------------------------
# 选种依据：物质证据（照片）+ 对话证据（承认 2008/2011 行为）+ 身体证据（握—松）
#           + 304 公交票（UP-007）+ 2011"我到了"短信延迟回响（UP-008/UP-011）
# 五者形成完整闭环。这是 AI 原生门槛 A 触达（NPC 主动提起玩家行为）的关键。
# 共 5 个 mandatory echo（UP-007/008/011 把 3 增到 5）。
mandatory_echoes:
  - id: two_photos_takeout_compare
    description: 莱拉从包中、阿拉什从诗集取出两张同版照片（两个物件都是 2008+2011 沉淀的产物）
    trigger: 玩家对 reunion_photos 执行 investigate 或 give
    target_scenes: [reunion_2024]   # 本场景闭环
    ai_director_must_invoke: true
    references_2008: [photo_lab_2008.seed.photo_in_pocket, photo_lab_2008.seed.photo_in_book]
    references_2011: [farewell_2011.inherited_objects.photo_2008_inherited_to_2024, farewell_2011.inherited_objects.book_2008_inherited_to_2024]

  - id: first_words_admit_2008_2011
    description: 莱拉第一眼选择后桌边开口承认 2008/2011 的具体行为（NPC 主动提起玩家行为）
    trigger: gaze_target_recalled enabled AND 玩家对 reunion_scene 执行 reveal 或 question
    target_scenes: [reunion_2024]
    ai_director_must_invoke: true
    references_2008: [photo_lab_2008.seed.*]
    references_2011: [farewell_2011.seed.grip_then_release_2011, farewell_2011.seed.name_of_kamran_spoken, farewell_2011.seed.bus_ticket_pair_unused]
    ai_director_constraint: "必须引用 player 在 photo_lab_2008 或 farewell_2011 的具体行为之一，不允许泛化叙述"
    # ----- UP-20260715-010：5 句备选台词，NPC Agent 根据玩家本局触发的行为自动匹配 -----
    # 选句规则：NPC Agent 用 referencedMemoryIds 自动匹配 causal_seed；
    #           多触发按 priority 字段（数字小 = 优先级高）取最触动的一条；
    #           若无任何 candidate 匹配，AI 导演禁止自由发挥——使用 line_01 兜底。
    candidate_lines:
      - line_id: line_01_photo_in_pocket
        text: "你把那张照片带在身上带了多少年？"
        speaker: arash
        referenced_seed: photo_in_pocket
        referenced_2008_seed: photo_lab_2008.seed.photo_in_pocket
        priority: 1
      - line_id: line_02_photo_in_book
        text: "我在诗集里一直留着那张照片……"
        speaker: arash
        referenced_seed: photo_in_book
        referenced_2008_seed: photo_lab_2008.seed.photo_in_book
        priority: 2
      - line_id: line_03_grip_then_release
        text: "你握住又松开……和那时候一模一样。"
        speaker: arash
        referenced_seed: grip_then_release
        referenced_2008_seed: photo_lab_2008.seed.grip_then_release
        priority: 3
      - line_id: line_04_bus_ticket_pair
        text: "你那两张 304 公交票……阿拉什你一直留着吗？"
        speaker: leila
        referenced_seed: bus_ticket_pair_unused
        referenced_2011_seed: farewell_2011.seed.bus_ticket_pair_unused
        priority: 4
      - line_id: line_05_i_arrived_text
        text: "2011 年那条'我到了'的短信……我一直存着。"
        speaker: leila
        referenced_seed: i_arrived_text
        referenced_2011_seed: farewell_2011.seed.i_arrived_text
        priority: 5
    selection_rule:
      algorithm: |
        1. NPC Agent 拉取玩家本局触发的所有 causal_seed 列表
           （from player_action.evidenceIds + npc_raised_echoes + belief_matrix.memoryRefs）
        2. 对 candidate_lines 按 priority 升序遍历，找到第一个
           referenced_seed 在玩家触发列表里的 line
        3. 若多触发：取 priority 最小（即"最触动"）的那条
        4. 若无任何 candidate 匹配：AI 导演必须使用 line_01_photo_in_pocket 兜底
           —— 禁止自由发挥台词
      red_line: "AI 导演不得在 candidate_lines 之外创造台词"

  - id: grip_release_2024_echo
    description: 莱拉与阿拉什在桌边再次握—松（2008→2011→2024 三跳链完整）
    trigger: inherited_objects.grip_then_release_2011 enabled AND 玩家在告别时执行 comfort 或 give
    target_scenes: [reunion_2024]
    ai_director_must_invoke: true
    references_2008: [photo_lab_2008.seed.grip_then_release]
    references_2011: [farewell_2011.seed.grip_then_release_2011]

  # ----- UP-20260715-007 [critical]：304 公交票 2024 回响 -----
  - id: bus_ticket_2024_seen
    description: 阿拉什从诗集末页取出 304 公交票，莱拉**看见**（不是念，不是读）
    trigger: 玩家对 bus_tickets_in_book_end 执行 investigate 或 give
    target_scenes: [reunion_2024]
    ai_director_must_invoke: true
    references_2008: [photo_lab_2008.seed.bus_ticket_in_book]
    references_2011: [farewell_2011.seed.bus_ticket_pair_unused]
    ai_director_constraint: "莱拉必须以'看见'为动作（视觉动词 see / spot / glimpse）；禁止以'念'或'读'为动作（不是 read / recite / announce）；导演不可代她说'公交票'三字——必须由 leila.npc_proposal 自己说"
    verb_constraint:
      leila_allowed_verbs: [see, spot, glimpse, notice, observe, look_at, watch]
      leila_forbidden_verbs: [read, recite, announce, declare, read_aloud, say, speak]

  # ----- UP-20260715-008/011 [critical]：2011"我到了"短信 2024 延迟回响 -----
  - id: i_arrived_text_2024_resonance
    description: 咖啡桌上手机亮起 2011 阿拉什的'我到了'短信，莱拉**主动读给阿拉什听**
    trigger: 玩家对 leila_phone 或 coffee_table 执行 investigate AND 玩家在 reunion_2024 触发任意 mandatory echo
    target_scenes: [reunion_2024]
    ai_director_must_invoke: true
    references_2011: [farewell_2011.seed.i_arrived_text]
    ai_director_constraint: "莱拉必须以'主动读'为动作（不是被动亮起）；导演不可代她把短信念出来——必须由 leila.npc_proposal 自己发声"
    verb_constraint:
      leila_required_verbs: [read_aloud, read, say, speak]  # 必须有发声动作
      director_forbidden: "director.narration 不得包含'我到了'三个字的全句——必须由 leila.npc_proposal.speech 承载"

