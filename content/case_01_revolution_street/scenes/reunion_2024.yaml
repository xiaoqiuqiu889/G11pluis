# -----------------------------------------------------------------------------
# 私人终章（UP-20260715-009 [critical]）
# 触发条件：玩家购买 ¥48 收藏版 OR 完成 reunion_2024 mandatory echo 至少 1 个
# 失败时显示"你还没做完这个故事"（驱动留存）
# 成本：≤ 5 次主调用（决策 5 硬红线 20 次以内）
# 三段式：物件回望 / 身体回望 / 远方收束
# -----------------------------------------------------------------------------
private_epilogue:
  unlock_conditions:
    - id: condition_paid
      description: "玩家购买 ¥48 收藏版"
      flag: reunion_epilogue_pack_owned
      flag_value: true
    - id: condition_completed_echo
      description: "完成 reunion_2024 mandatory echo 至少 1 个"
      check: count(reunion_2024.mandatory_echoes.fired) >= 1
      min_count: 1
  unlock_logic: OR  # 任一条件满足即解锁
  failure_message: "你还没做完这个故事"  # 驱动留存
  failure_cta: "继续 13 年前的咖啡馆"
  cost_budget:
    max_main_llm_calls: 5                # ≤ 5 次主调用
    hard_red_lines_max: 20               # 决策 5 硬红线
    single_call_output_tokens: 800       # 决策 5 R2
  structure:                             # 三段式结构
    - section_id: epilogue_1_object_lookback
      title: "物件回望"
      order: 1
      description: "屏幕展示玩家本局带出来的物件，每段 1-2 句'13 年后某人记得它'"
      segment_count: 3
      generation_rule: |
        对 player 在 reunion_2024 触发的 inherited_objects 列表遍历，
        每个物件生成 1 段；引用玩家本局的具体行为（如 photo 放置方式、公交票夹法）
      segment_template:
        character: <npc_id>
        text: "<npc_id> 13 年后还记得 <artifact_id>，因为 <reason>"
      examples:
        - character: leila
          text: "莱拉 13 年后还记得 photo_2008_in_pocket_2024，因为每逢 6 月 21 日她都把照片翻到背面读那行手写的日期"
        - character: arash
          text: "阿拉什 13 年后还记得 book_jalal_2008_with_photo_2024，因为诗集里那张照片的折痕变成了他读诗的节拍器"
        - character: leila
          text: "莱拉 13 年后还记得 bus_ticket_pair_2024，因为 304 路那班车她一次都没坐过"
      forbids_template: "禁止使用泛化叙述（'13 年后我依然记得'）；必须引用 artifact_id"
    - section_id: epilogue_2_body_lookback
      title: "身体回望"
      order: 2
      description: "引用玩家本局选择的身体动作（握—松、取出照片的指尖、写下日期的笔触）"
      segment_count: 3
      generation_rule: |
        对 player 在 reunion_2024 触发的身体动作列表遍历
        （evidence 中 type=body_action 的项）
      segment_template:
        text: "<body_action_id> 的痕迹，13 年后还在 <character_id> 身上"
      examples:
        - text: "握—松的痕迹，13 年后还在阿拉什端茶时摩挲杯沿的拇指"
        - text: "取出照片的指尖，13 年后还在莱拉翻行李牌的手指"
        - text: "写下日期的笔触，13 年后还在 2008 照片背面的 2008.6.21"
      forbids_template: "禁止只描述表情；必须绑定身体部位（拇指/指尖/笔触）"
    - section_id: epilogue_3_far_convergence
      title: "远方收束"
      order: 3
      description: "卡姆兰航班短信 + 玛丽亚姆流星观测，引用'我到了'的延迟回响"
      segment_count: 2
      generation_rule: |
        对 reunion_2024 的 far_echo_routes（卡姆兰 / 玛丽亚姆）逐项生成
        每段必须引用 reunion_2024 的 i_arrived_text_2024_resonance mandatory echo
      segment_template:
        text: "<npc_id> 在 <place> 收到/发出 <message>，13 年后才知道那是同一个晚上"
      examples:
