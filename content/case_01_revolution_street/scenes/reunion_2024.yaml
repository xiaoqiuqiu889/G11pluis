# =============================================================================
# 革命街没有尽头 · 第一案 · 第一案纵切片
# 场景 3 / 3 ：reunion_2024（伊斯坦布尔·卡拉柯伊老咖啡馆与路口）
# -----------------------------------------------------------------------------
# 时代：2024 年秋，伊斯坦布尔
# 锚点说明：这是 V5 / V6 设计契约中第五章（重逢）的纵切片，
#           玩家在 chapter4（两个城市蒙太奇）+ chapter5（重逢视线 +
#           诗集照片配对 + 路口分开）之后，13 年后的对视与最后两步。
# 跨年代回响：必须显式引用 photo_lab_2008 与 farewell_2011 的具体行为；
#           NPC 必须主动提起玩家在 2008 / 2011 的具体动作；
#           远期回响在这里收束。
# 写入规范：UTF-8；YAML 1.2；所有中文为正文。
# =============================================================================

scene_id: reunion_2024
title: 伊斯坦布尔·卡拉柯伊老咖啡馆与路口
era: "2024"
location: 土耳其·伊斯坦布尔·卡拉柯伊·老咖啡馆 + 街口
atmosphere:
  - 雨后
  - 木门推开声
  - 老铜勺碰糖罐
  - 银发与手背细纹
  - 发黄开裂的书脊
  - 模糊外语人声
  - 倒过来的绿光
  - 机场方向牌

# -----------------------------------------------------------------------------
# 蒙太奇：reunion_2024 入口 1-2 分钟（UP-20260715-003）
# 0 LLM 调用（纯客户端 React + CSS animation + 静态图片 + 音频）
# 任何服务端在 montage 期间不得触发 LLM；Resolver 必须跳过本段
# -----------------------------------------------------------------------------
montage:
  duration_seconds: 120                # 1-2 分钟
  llm_calls: 0                         # 0 LLM 调用（纯前端）
  client_implementation: react-css-anim
  skip_resolver: true                  # Resolver 必须在 montage 期间跳过
  phases:
    - phase_id: phase_0_30_timeline
      start_seconds: 0
      end_seconds: 30
      title: "13 年时间线"
      description: "横向滚动时间线：2008 毕业照 → 2011 机场 → 2017 邮件删除 → 2020 望远镜 → 2024 推门"
      assets:
        - /art-v5/timeline-2008-graduation.png
        - /art-v5/timeline-2011-airport.png
        - /art-v5/timeline-2017-email-deletion.png
        - /art-v5/timeline-2020-telescope.png
        - /art-v5/timeline-2024-door.png
      client_implementation: react-timeline-strip
      css_anim: horizontal-scroll
    - phase_id: phase_30_60_ambient
      start_seconds: 30
      end_seconds: 60
      title: "环境声渐入"
      description: "伊斯坦布尔雨声 + 咖啡机 + 远处加拉塔桥海鸥（音量从 0 渐入到 0.4）"
      audio_assets:
        - /audio/istanbul-rain-loop.mp3
        - /audio/cafe-machine-loop.mp3
        - /audio/galata-gulls-far.mp3
      client_implementation: web-audio-api
      volume_curve: linear 0.0 → 0.4
    - phase_id: phase_60_90_photo
      start_seconds: 60
      end_seconds: 90
      title: "莱拉从包中取照片"
      description: "莱拉从斜挎包内袋取出 2008 同版毕业照放在桌上（仅手腕动作 + 照片落桌的物理反馈）"
      assets:
        - /art-v5/leila-photo-takeout.png
        - /art-v5/canonical-graduation-photo.png
      client_implementation: css-anim-keyframes
      css_anim: ease-out-300ms
    - phase_id: phase_90_120_arrival
      start_seconds: 90
      end_seconds: 120
      title: "阿拉什推门"
      description: "阿拉什推门，诗集抱在臂弯，手机亮起 2011 那条'我到了'短信"
      assets:
        - /art-v5/arash-enters-cafe.png
        - /art-v5/arash-phone-i-arrived.png
        - /art-v5/poetry-book-photo-close.png
      client_implementation: css-anim-keyframes
      css_anim: ease-in-500ms
      final_state:  # 蒙太奇结束时的世界状态
        leila_position: at_table
        arash_position: at_doorway
        leila_holding: graduation_photo_leila
        arash_holding: poetry_book + i_arrived_text_unread
        cafe_state: rain_just_stopped

# -----------------------------------------------------------------------------
# 固定锚点：策划硬性要求，AI 导演不得违反
# -----------------------------------------------------------------------------
required_anchors:
  - 锚点 1：场景设定在伊斯坦布尔卡拉柯伊老咖啡馆，雨后，桌上有糖罐与一张照片
  - 锚点 2：莱拉与阿拉什都已是 34—35 岁的中年版本（椭圆脸与卷发仍在，鬓边灰白、皱纹）
  - 锚点 3：阿拉什推门而入时手抱诗集
  - 锚点 4：莱拉手机里仍残留 2011 那条"我到了"短信
  - 锚点 5：咖啡小票底部有纪念编码 G1N-DEMO-2024-05（第五章礼包源）
  - 锚点 6：场景必须显式引用 photo_lab_2008 与 farewell_2011 至少各一项具体行为
  - 锚点 7：NPC 必须主动提起玩家 2008 / 2011 的具体行为（不是玩家主动暴露）
  - 锚点 8：场景结束于路口，绿灯亮起，两人走向不同方向
  - 锚点 9：远期回响在这里收束（far_echo_routes 列表可以为空，但 convergence_summary 必填）
  - 锚点 10：卡姆兰与玛丽亚姆在远程处存在（电话 / 短信 / 未接来电），不直接出场

# -----------------------------------------------------------------------------
# 核心冲突：场景要解决的具体张力
# -----------------------------------------------------------------------------
core_conflict:
  - 冲突 1：13 年后第一眼落在何处（手与白发 / 诗集 / 时钟与机场方向）
  - 冲突 2：是否把两张同版毕业照从包中与从诗集中取出，并在桌上对齐
  - 冲突 3：是否在路口分开前，把"卡姆兰正在等我"说出口
  - 冲突 4：是否承认 2011 那一夜/2011 机场那句没说完的话

# -----------------------------------------------------------------------------
# 行为白名单：AI 导演只能从这些节拍中选择
# -----------------------------------------------------------------------------
allowed_beats:
  - 试探
  - 玩笑（带苦味也带暖意）
  - 回避
  - 表白未遂
  - 共同秘密被承认
  - 替对方保存的东西被认出
  - 替自己保留的退路被让出
  - 把"我到了"重新念一次
  - 把名字留在街口
  - 在意对方是否还记得 2008

# -----------------------------------------------------------------------------
# 禁止揭露：未达条件的秘密不能输出
# -----------------------------------------------------------------------------
forbidden_reveals:
  - 任何关于 2025 之后的具体时间感
  - 莱拉 / 阿拉什任何一人在 2024 之后的健康 / 财务 / 家庭变动
  - 玛兹雅在设拉子儿童图书馆之后的生活细节
  - 卡姆兰冲洗的黑白停车场照片具体内容
  - 玛丽亚姆记录的流星具体日期
  - 莱拉姨妈是否仍在世
  - 任何关于"下一案"的暗示
  - 玩家在 photo_lab_2008 未触发的种子（不能被说"你曾经 X"——除非真的触发过）
  - 玩家在 farewell_2011 未触发的种子（同上）

# -----------------------------------------------------------------------------
# AI 行为白名单：12 种结构化行为
# -----------------------------------------------------------------------------
allowed_actions:
  - investigate   # 检查诗集、照片、咖啡小票、咖啡馆时钟、街口信号灯
  - reveal        # 让 2008 / 2011 的具体行为被说出口
  - conceal       # 把照片 / 公交票 / 诗重新收回
  - question      # 询问对方 / 自己 / 收件箱
  - confront      # 直面"13 年"这一事实
  - comfort       # 安抚对方 / 安抚自己
  - give          # 给出照片 / 诗集 / 一句话
  - destroy       # 把咖啡小票 / 街口备忘撕掉
  - promise       # 许下"等下一年"或"等再下一年"
  - wait          # 站在路口等绿灯 / 站在桌边等对方先开口
  - leave         # 走向机场 / 走向酒店
  - silence       # 把已经成型的句子咽回去

# -----------------------------------------------------------------------------
# 行为预算：本场景玩家可执行次数限制
# -----------------------------------------------------------------------------
turn_budget:
  total: 8
  investigate: 3
  reveal: 2
  conceal: 1
  question: 2
  confront: 1
  comfort: 1
  give: 2
  destroy: 1
  promise: 1
  wait: 1
  leave: 1
  silence: 2

