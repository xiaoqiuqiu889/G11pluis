# =============================================================================
# 革命街没有尽头 · 第一案 · 第一案纵切片
# 场景 1 / 3 ：photo_lab_2008（地下放映室与同版毕业照）
# -----------------------------------------------------------------------------
# 时代：2008 年夏，德黑兰，毕业季
# 锚点说明：这是 V5 / V6 设计契约中"毕业照那天（promise）"时刻的纵切片，
#           也是 choice-one（折诗 / 主动吻 / 先行离开）之后的直接延续。
#           摄影师大刚问"照片要冲两张吗？"之后，莱拉与阿拉什要在地下放映室
#           决定如何分配这两张同版冲印的毕业照。
# 跨年代回响：必须影响 2011（farewell_2011）和 2024（reunion_2024）两个场景。
# 写入规范：UTF-8；YAML 1.2；任何字符不被转义；所有中文为正文。
# =============================================================================

scene_id: photo_lab_2008
title: 革命街地下放映室与两张同版毕业照
era: "2008"
location: 德黑兰大学·革命街旧书店地下室·地下放映室
atmosphere:
  - 闷热
  - 旧灯泡
  - 机油
  - 毕业季
  - 胶片气味
  - 黄昏透进窄窗
  - 偶尔的地铁震动
  - 折叠椅腿的吱嘎声
  - 等待显影的耐心

# -----------------------------------------------------------------------------
# 固定锚点：策划硬性要求，AI 导演不得违反
# -----------------------------------------------------------------------------
required_anchors:
  - 锚点 1：两张毕业照必须来自同一张 canonical asset，画面、站位、裁切一致
  - 锚点 2：摄影师大刚确实在按下快门前问过"照片要冲两张吗？"
  - 锚点 3：莱拉是 21—22 岁的年轻版本（椭圆脸、深色杏仁眼、浅灰头巾、卷黑发）
  - 锚点 4：阿拉什是 22—23 岁的年轻版本（瘦高、卷黑发、轻胡茬、深海军蓝夹克）
  - 锚点 5：地下放映室有一台 16mm 放映机、一把木椅、一只金属片盒
  - 锚点 6：照片背面的冲印批次号必须显影为 G1N-DEMO-2008-01（第一章礼包源）
  - 锚点 7：场景发生在 2008 年夏，毕业典礼当天或次日
  - 锚点 8：场景必须为 2011 机场送别准备至少一种可被远期回响捡到的"携带物"
  - 锚点 9：场景必须为 2024 伊斯坦布尔重逢准备至少一种可被诗集打开的"共同证据"

# -----------------------------------------------------------------------------
# 核心冲突：场景要解决的具体张力
# -----------------------------------------------------------------------------
core_conflict:
  - 冲突 1：是否把两张同版毕业照分别交给两人，让每一张都陪对方度过未来 13 年
  - 冲突 2：是否在分配照片时承认"我希望你留着"或"我也想留一张"——即未说出的告白
  - 冲突 3：是否让阿拉什亲手把其中一张夹进诗集，还是莱拉替他把这一动作做完
  - 冲突 4：是否在背面手写一个只有两人知道的暗号（与之后 2011 行李牌呼应）

# -----------------------------------------------------------------------------
# 行为白名单：AI 导演只能从这些节拍中选择（v0.1 PRD 第 9 节）
# -----------------------------------------------------------------------------
allowed_beats:
  - 试探
  - 玩笑
  - 回避
  - 表白未遂
  - 共同秘密形成
  - 替对方做决定
  - 替自己保留退路
  - 留下一个不属于当下的字
  - 在意对方是否在意
  - 把动作藏进工具盒

# -----------------------------------------------------------------------------
# 禁止揭露：未达条件的秘密不能输出
# -----------------------------------------------------------------------------
forbidden_reveals:
  - 莱拉未来的婚姻（与卡姆兰）
  - 莱拉与卡姆兰的圣何塞视频通话
  - 莱拉 2011 年的单程行李牌
  - 十三年后的伊斯坦布尔重逢
  - 玛兹雅 2009 年 6 月获释的消息
  - 阿拉什父亲的复健预约与维修铺的债务
  - 莱拉未来在圣何塞做波斯语本地化的工作
  - 玛丽亚姆与流星观测表
  - 阿拉什带去机场的两张旧公交票
  - 2011 机场航班号、登机口、目的地
  - 2009 学校刊物事件与处分通知
  - 莱拉姨妈第一次介绍卡姆兰的电话

# -----------------------------------------------------------------------------
# AI 行为白名单：12 种结构化行为
# -----------------------------------------------------------------------------
allowed_actions:
  - investigate   # 调查：检查照片正面 / 背面 / 放映机 / 工具盒
  - reveal        # 揭露：让一个此前被藏起的事实浮出水面（限本场景内）
  - conceal       # 隐藏：把一句话 / 一个动作收回去
  - question      # 询问：向阿拉什 / 大刚 / 自己的记忆发问
  - confront      # 直面：让一段悬而未决的关系在动作里被承认
  - comfort       # 安抚：把对方的紧张接住
  - give          # 给出：把照片 / 工具 / 一句话交给对方
  - destroy       # 销毁：把冲印废片、未寄出的字条处理掉
  - promise       # 承诺：在某物上许下不写明日期的约定
  - wait          # 等待：让一段沉默持续三秒以上
  - leave         # 离开：先走出地下放映室、留对方独自面对灯泡
  - silence       # 沉默：把已经成型的句子咽回去

# -----------------------------------------------------------------------------
# 行为预算：本场景玩家可执行次数限制
# -----------------------------------------------------------------------------
turn_budget:
  total: 8
  investigate: 3
  reveal: 2
  conceal: 1
  question: 2
  confront: 2
  comfort: 1
  give: 3
  destroy: 1
  promise: 2
  wait: 2
  leave: 1
  silence: 2

# -----------------------------------------------------------------------------
