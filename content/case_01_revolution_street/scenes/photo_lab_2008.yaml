# -----------------------------------------------------------------------------
# 在场人物
# -----------------------------------------------------------------------------
characters_present:
  - id: leila
    name: 莱拉
    initial_state: 试探
    visibility: 主角视角可见
    state_notes:
      - 文学系三年级，今天毕业典礼刚结束
      - 头巾边缘露出的卷黑发还沾着礼堂的彩屑
      - 手里抱着牛皮纸袋，里面有刚冲印好的两张照片

  - id: arash
    name: 阿拉什
    initial_state: 紧张
    visibility: 主角视角可见
    state_notes:
      - 物理系毕业，父亲中风后维修铺、药单和账本都在等他
      - 下午在放映室修了两个钟头 16mm 放映机
      - 工具盒里还放着今天多撕的一张 304 路公交票

  - id: dagang
    name: 大刚（摄影师，临时在场）
    initial_state: 中立
    visibility: 主角视角可见
    state_notes:
      - 毕业季接散活的摄影师，刚把冲印件送到
      - 问过"照片要冲两张吗？"之后没有立刻离开
      - 手里夹着半根没点的烟

# -----------------------------------------------------------------------------
# 因果种子：本场景行为会触发哪些远期回响
# -----------------------------------------------------------------------------
causal_seeds:
  - id: photo_in_pocket
    description: 莱拉把其中一张毕业照放进斜挎包内袋
    trigger: 玩家对 photo_pair 执行 give_to_self 或 conceal
    effects:
      - 锚点 1 2011 机场送别时，莱拉伸手进包找登机牌时会摸到这张照片
      - 锚点 2 2024 伊斯坦布尔咖啡馆，莱拉会从包里取出这张照片与阿拉什的诗集照片配对
      - 锚点 3 2024 路口分开前，莱拉会把这张照片重新滑回包中

  - id: photo_in_book
    description: 阿拉什把其中一张毕业照夹进贾拉鲁丁·鲁米诗集
    trigger: 玩家对 book_jalal 或 photo_pair 执行 give 并由阿拉什收下
    effects:
      - 锚点 1 2011 机场，阿拉什在转身离开时诗集从夹克内袋滑落，照片露出来一角
      - 锚点 2 2024 重逢，阿拉什推门时诗集就抱在臂弯里，是莱拉最先认出的旧物
      - 锚点 3 2024 路口，阿拉什合上诗集时照片的磨损边角压到了最后一页

  - id: both_photos_with_one
    description: 莱拉把两张同版照片都收进自己包里
    trigger: 玩家对 photo_pair 执行 give_to_self 两次或 conceal_with_intent
    effects:
      - 锚点 1 2011 机场，阿拉什没有带任何属于那一天的物件
      - 锚点 2 2024 咖啡馆，莱拉必须独自从包里取出两张中的一张，另一张仍留在包里
      - 锚点 3 2024 阿拉什翻诗集时，里面没有照片，必须先看莱拉的手

  - id: no_photo_handed_over
    description: 莱拉把照片全留在牛皮纸袋
    trigger: 玩家对 envelope 执行 wait 或 conceal
    effects:
      - 锚点 1 2011 机场送别，两人都没有那张照片作为随身物
      - 锚点 2 2024 重逢时，桌上不会自然出现照片，必须由莱拉主动拿出
      - 锚点 3 2024 路口分开时，莱拉没有可重新滑回包中的那张照片

  - id: poem_in_toolbox
    description: 那张没有署名的折诗被阿拉什放进工具盒（前置：choice-one 已选 poem）
    trigger: 玩家对 folded_poem 执行 give 并由阿拉什收下
    effects:
      - 锚点 1 2011 机场，阿拉什口袋里仍夹着这张折诗
      - 锚点 2 2024 重逢，阿拉什会主动提到"工具盒里那张诗的方向"——如果他仍在用那个工具盒

  - id: bus_ticket_in_book
    description: 莱拉把阿拉什多撕的 304 路公交票夹进诗集
    trigger: 玩家对 bus_ticket_pair 执行 give 并由阿拉什收下
    effects:
      - 锚点 1 2011 机场，阿拉什不再带着那两张旧公交票——这一动作被玩家提前消费
      - 锚点 2 2024 重逢，诗集里没有公交票，阿拉什不会"在路口把手从外套口袋里抽出来"

  - id: date_written_on_back
    description: 莱拉在照片背面手写"2008.6.21 革命街放映室"或类似
    trigger: 玩家对 photo_back 执行 give（写下一个字）
    effects:
      - 锚点 1 2011 机场，莱拉翻看照片时会重新读到这一行字
      - 锚点 2 2024 咖啡馆，莱拉把照片翻到背面，日期成为两人无言对视的支点

  - id: grip_then_release
    description: 莱拉和阿拉什在分照片时握了一下手，又立刻松开
    trigger: 玩家对 arash 执行 comfort + give + silence
    effects:
      - 锚点 1 2011 机场，安检口前阿拉什会下意识重复这个"握—松"动作
      - 锚点 2 2024 重逢，他们先认出对方在端茶时拇指摩挲杯沿的旧习惯

  - id: first_kiss_revisited
    description: 莱拉在分照片前补上了停电那晚未完成的吻（前置：choice-one 已选 leave）
    trigger: 玩家对 arash 执行 confront + give + promise
    effects:
      - 锚点 1 2011 机场，阿拉什会先伸手找她，但她这次没有更早碰到那只手
      - 锚点 2 2024 重逢，咖啡馆的灯闪一下时，两人没有再靠近——但莱拉的眼神里仍有这次补上的吻

  - id: dagang_paid_extra
    description: 莱拉付钱让大刚再多冲印一张
    trigger: 玩家对 dagang 执行 give（现金）
    effects:
      - 锚点 1 大刚从两张变三张，多出来的一张会被莱拉寄给姨妈
      - 锚点 2 2011 机场，姨妈拿着那张照片在电话里说"她现在能自己决定"

# -----------------------------------------------------------------------------
# 必触发回响（决策 3 显式登记；AI 导演不能自由发挥）
# -----------------------------------------------------------------------------
# 选种依据：3 跳链最完整——物质证据从 2008 出发，在 2011 仍在手中，
# 在 2024 仍可被取出。这是整个叙事弧的物质骨架；
# admit_2008_behaviors_5_candidate_lines 是 UP-20260715-015 的 3 scene 统一——
# 5 句备选台词对应 5 个 2008 行为种子，按 priority 升序取最触动；
# 与 farewell_2011 的 admit_1985_behaviors_5_candidate_lines、
# reunion_2024 的 first_words_admit_2008_2011 配对（设计模式统一）。
mandatory_echoes:
  - id: photo_in_pocket
    description: 莱拉把毕业照放进斜挎包内袋 → 2011 摸到 → 2024 取出
    trigger: 玩家对 photo_pair 执行 give_to_self 或 conceal
    target_scenes: [farewell_2011, reunion_2024]
    ai_director_must_invoke: true

  - id: photo_in_book
    description: 阿拉什把毕业照夹进鲁米诗集 → 2011 滑出 → 2024 抱在臂弯
    trigger: 玩家对 book_jalal 或 photo_pair 执行 give
    target_scenes: [farewell_2011, reunion_2024]
    ai_director_must_invoke: true

  # ----- UP-20260715-015：3 scene 5 句备选统一 — photo_lab_2008 段 -----
  # 5 句备选对应 5 个 2008 行为种子，按 priority 升序取最触动；
  # 无任何 candidate 匹配 → line_01_photo_in_pocket 兜底（禁自由发挥）。
  - id: admit_2008_behaviors_5_candidate_lines
    description: 莱拉或阿拉什在放映室分照片时开口承认 2008 行为（5 句备选；UP-20260715-015）
    trigger: 玩家对 arash 或 leila 执行 reveal 或 question；或对 photo_pair / book_jalal 执行 give
    target_scenes: [farewell_2011, reunion_2024]
    ai_director_must_invoke: true
    references_2008:
      - photo_in_pocket
      - photo_in_book
      - grip_then_release
      - poem_in_toolbox
      - date_written_on_back
    ai_director_constraint: "必须引用 player 2008 的具体行为之一；不允许泛化叙述；与 farewell_2011 的 admit_1985_behaviors_5_candidate_lines + reunion_2024 的 first_words_admit_2008_2011 配对——5 句备选结构跨场景统一"
    candidate_lines:
      - line_id: line_01_photo_in_pocket
        text: "我把这一张放进包里……你不会怪我吧？"
        speaker: leila
        seed_id: photo_in_pocket
        referenced_seed: photo_in_pocket
        referenced_2008_seed: photo_lab_2008.seed.photo_in_pocket
        priority: 1
      - line_id: line_02_photo_in_book
        text: "这一张我夹进诗集……你替我留着诗吗？"
        speaker: arash
        seed_id: photo_in_book
        referenced_seed: photo_in_book
        referenced_2008_seed: photo_lab_2008.seed.photo_in_book
        priority: 2
      - line_id: line_03_grip_then_release
        text: "我们刚才握了一下手……又松开了"
        speaker: leila
        seed_id: grip_then_release
        referenced_seed: grip_then_release
        referenced_2008_seed: photo_lab_2008.seed.grip_then_release
        priority: 3
      - line_id: line_04_poem_in_toolbox
        text: "你那张折诗我收进工具盒了……别告诉任何人"
        speaker: arash
        seed_id: poem_in_toolbox
        referenced_seed: poem_in_toolbox
        referenced_2008_seed: photo_lab_2008.seed.poem_in_toolbox
        priority: 4
      - line_id: line_05_date_written_on_back
        text: "我在照片背面写了 2008.6.21……你看不看得到"
        speaker: leila
        seed_id: date_written_on_back
        referenced_seed: date_written_on_back
        referenced_2008_seed: photo_lab_2008.seed.date_written_on_back
        priority: 5
    selection_rule:
      algorithm: |
        1. NPC Agent 拉取玩家本局触发的所有 causal_seed 列表
           （from player_action.evidenceIds + npc_raised_echoes + belief_matrix.memoryRefs）
        2. 对 candidate_lines 按 priority 升序遍历，找到第一个
           seed_id / referenced_seed 在玩家触发列表里的 line
        3. 若多触发：取 priority 最小（即"最触动"）的那条
        4. 若无任何 candidate 匹配：AI 导演必须使用 line_01_photo_in_pocket 兜底
           —— 禁止自由发挥台词
      red_line: "AI 导演不得在 candidate_lines 之外创造台词"

