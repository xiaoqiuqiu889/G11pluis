  - creates_future_echo: true         # 至少触发 1 个影响 2011 或 2024 的因果种子
  - preserves_macro_endpoints: true   # 2008 端点不动，2011 / 2024 端点不动
  - forbidden_reveals_strict: true    # 没有泄露莱拉婚姻、卡姆兰、十三年后重逢
