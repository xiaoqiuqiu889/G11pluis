# =============================================================================
# 革命街没有尽头 · 第一案 · 第一案纵切片
# 场景 2 / 3 ：farewell_2011（德黑兰国际机场·出发大厅）
# -----------------------------------------------------------------------------
# 时代：2011 年秋，德黑兰
# 锚点说明：这是 V5 / V6 设计契约中 echo-three（机场送别）的纵切片，
#           玩家在 chapter3 的最后一次主选择（truth / escape / conceal）
#           之后，莱拉与阿拉什在国际出发大厅的最后几分钟。
# 跨年代回响：必须引用 photo_lab_2008 的具体行为（玩家是否带照片、是否
#           写了日期、是否握—松过手、诗是否在工具盒、公交票是否在诗集）
#           并为 reunion_2024 准备至少 2 个因果种子。
# 写入规范：UTF-8；YAML 1.2；所有中文为正文。
# =============================================================================

scene_id: farewell_2011
title: 德黑兰国际机场·出发大厅
era: "2011"
location: 德黑兰伊玛目霍梅尼国际机场·国际出发大厅
atmosphere:
  - 玻璃与不锈钢
  - 时钟秒针
  - 模糊广播
  - 行李箱滚轮
  - 旧外套领口
  - 早班机前的人群
  - 烧过的咖啡味
  - 远处登机口

# -----------------------------------------------------------------------------
# 固定锚点：策划硬性要求，AI 导演不得违反
# -----------------------------------------------------------------------------
required_anchors:
  - 锚点 1：场景设定在德黑兰国际机场国际出发大厅，必须出现值机柜台、安检入口、抽象航班板与大时钟
  - 锚点 2：阿拉什胸前仍挂着物理实验室门卡（注意：他可能已经毕业但仍保留门卡）
  - 锚点 3：莱拉手中有一只深色行李箱，登机牌攥在右手
  - 锚点 4：行李牌背面有非航空公司字符（演示码 G1N-DEMO-2011-03 显影点）
  - 锚点 5：场景必须显式引用 photo_lab_2008 至少一项具体行为（玩家行为）
  - 锚点 6：场景必须为 reunion_2024 准备至少 2 个因果种子
  - 锚点 7：登机广播在场景结束前必须响起
  - 锚点 8：场景结束于"分开"——两人走向不同方向，不被任何一种承诺改写

# -----------------------------------------------------------------------------
# 核心冲突：场景要解决的具体张力
# -----------------------------------------------------------------------------
core_conflict:
  - 冲突 1：莱拉是否在最后几分钟里把卡姆兰、婚姻、机票三件事一起说完
  - 冲突 2：阿拉什是否在最后几分钟里承认"我本来想叫住你"或"我也想留住你"
  - 冲突 3：莱拉是否把 2008 那张同版照片从包里取出又放回（携带物的最后一次处置）
  - 冲突 4：是否在行李牌背面写下某行字，让"卡姆兰的名字"在 13 年后被街上的人听到

# -----------------------------------------------------------------------------
# 行为白名单：AI 导演只能从这些节拍中选择
# -----------------------------------------------------------------------------
allowed_beats:
  - 试探
  - 玩笑（带苦味）
  - 回避
  - 表白未遂
  - 共同秘密形成
  - 替对方做决定
  - 替自己保留退路
  - 把动作藏进行李牌
  - 把名字留在信封里
  - 在意对方是否在意
  - 重新念出 2008 那句"别松手"

# -----------------------------------------------------------------------------
# 禁止揭露：未达条件的秘密不能输出
# -----------------------------------------------------------------------------
forbidden_reveals:
  - 莱拉 13 年后与阿拉什在伊斯坦布尔重逢
  - 莱拉在圣何塞做的具体本地化工作
  - 玛丽亚姆与流星观测表
  - 阿拉什后来在德黑兰做的具体研究 / 维修铺继承
  - 卡姆兰在圣何塞的具体摄影爱好
  - 莱拉姨妈第一次介绍卡姆兰的电话细节
  - 莱拉在圣何塞的具体住址 / 公寓
  - 2009 学校刊物事件与处分通知的细节
  - 任何关于"13 年后"的具体时间感
  - 莱拉 / 阿拉什其中任何一人在 2011 之后的健康 / 财务细节
  - 任何关于 reunion_2024 场景的镜头暗示

# -----------------------------------------------------------------------------
# AI 行为白名单：12 种结构化行为
# -----------------------------------------------------------------------------
allowed_actions:
  - investigate   # 检查行李牌、登机牌、信封、时钟、航班板
  - reveal        # 让卡姆兰的名字、婚姻、机票三件事从信封里出来
  - conceal       # 把名字 / 字 / 照片收回
  - question      # 询问阿拉什 / 自己 / 时钟
  - confront      # 直面"我也要走了"这一事实
  - comfort       # 安抚阿拉什 / 安抚自己
  - give          # 给出 2008 照片 / 公交票 / 一句话
  - destroy       # 把多余的登机牌副本撕掉 / 把没寄出的字条折进袋里
  - promise       # 许下"等一年"或"等再一年"
  - wait          # 站在时钟下面，让广播响过一次
  - leave         # 把行李箱推向安检口，不再回头
  - silence       # 把"我也想留下"咽回去

# -----------------------------------------------------------------------------
# 行为预算：本场景玩家可执行次数限制
# -----------------------------------------------------------------------------
turn_budget:
  total: 8
  investigate: 3
  reveal: 2
  conceal: 1
  question: 2
  confront: 1
  comfort: 1
  give: 2
  destroy: 1
  promise: 1
  wait: 1
  leave: 1
  silence: 2

# -----------------------------------------------------------------------------
# 玩家从 photo_lab_2008 继承的"携带物"（按种子是否触发来条件启用）
# -----------------------------------------------------------------------------
inherited_objects:
