# -----------------------------------------------------------------------------
# 必触发回响（决策 3 显式登记；AI 导演不能自由发挥）
# -----------------------------------------------------------------------------
# 选种依据：两个都是 2008 物质证据的身体级回响——
# 握—松 是 2008 地下室停电那晚的身体记忆，304 公交票是 2008 阿拉什的物件证据；
# admit_1985_behaviors_5_candidate_lines 是 UP-20260715-015 决策 2 补充条款的落地——
# 视角付费解锁后第一句台词必须引用 player 1985/1986/1989 的具体行为之一。
mandatory_echoes:
  - id: grip_then_release_2011
    description: 莱拉与阿拉什最后握—松（2008 地下室停电那晚握—松的 13 年后身体回响）
    trigger: 玩家在最后握手时机执行 give(conceal) 或 comfort + 玩家在最后一步才松手
    target_scenes: [reunion_2024]
    ai_director_must_invoke: true
    references_2008: [photo_lab_2008.seed.grip_then_release]

  - id: bus_ticket_pair_unused
    description: 阿拉什仍带着 2008 那两张 304 公交票（明确 2008 物件证据）
    trigger: inherited_objects.bus_ticket_in_book enabled AND 玩家未在机场 use 该物品
    target_scenes: [reunion_2024]
    ai_director_must_invoke: true
    references_2008: [photo_lab_2008.seed.bus_ticket_in_book]

  # ----- UP-20260715-015 + 决策 2 补充条款：5 句备选台词 -----
  # 视角付费解锁后第一句台词必须引用 player 1985/2008 行为。
  # 5 句备选对应 5 个 1985/1986/1989 行为种子，按 priority 升序取最触动的一条；
  # 无任何 candidate 匹配 → line_01_walkman_in_pocket_1985 兜底（禁自由发挥）。
  - id: admit_1985_behaviors_5_candidate_lines
    description: 阿拉什或莱拉在国际机场开口承认 1985/1986/1989 行为（5 句备选；UP-20260715-015）
    trigger: 玩家对 arash 或 leila 执行 reveal 或 question；或 narratorVoice ∈ {observer_leila, observer_arash}
    target_scenes: [reunion_2024]
    ai_director_must_invoke: true
    references_1985:
      - walkman_in_pocket_1985
      - grip_then_release_1985
      - chocolate_wrapper_1986
      - postcard_moscow_vienna
      - arrival_postcard_1989
    ai_director_constraint: "必须引用 player 1985/1986/1989 的具体行为之一；不允许泛化叙述；与 reunion_2024 的 first_words_admit_2008_2011 配对——5 句备选结构跨场景统一"
    candidate_lines:
      - line_id: line_01_walkman_in_pocket_1985
        text: "那个 walkman 我一直留着……"
        speaker: arash
        seed_id: walkman_in_pocket_1985
        referenced_seed: walkman_in_pocket_1985
        referenced_1985_seed: walkman_in_pocket_1985
        priority: 1
      - line_id: line_02_postcard_moscow_vienna
        text: "你 1986 年那张明信片……我从维也纳带过来了"
        speaker: arash
        seed_id: postcard_moscow_vienna
        referenced_seed: postcard_moscow_vienna
        referenced_1985_seed: postcard_moscow_vienna
        priority: 2
      - line_id: line_03_grip_then_release_1985
        text: "你握住又松开……和我们第一次听你弹琴那晚一模一样"
        speaker: leila
        seed_id: grip_then_release_1985
        referenced_seed: grip_then_release_1985
        referenced_1985_seed: grip_then_release_1985
        priority: 3
      - line_id: line_04_chocolate_wrapper_1986
        text: "你那两颗松子糖锡纸……我口袋里一直留到现在"
        speaker: leila
        seed_id: chocolate_wrapper_1986
        referenced_seed: chocolate_wrapper_1986
        referenced_1985_seed: chocolate_wrapper_1986
        priority: 4
      - line_id: line_05_arrival_postcard_1989
        text: "1989 年那条'我到了'的明信片……我一直贴在琴盖上"
        speaker: arash
        seed_id: arrival_postcard_1989
        referenced_seed: arrival_postcard_1989
        referenced_1985_seed: arrival_postcard_1989
        priority: 5
    selection_rule:
      first_line_rule: first_match_in_priority_order  # UP-20260715-021 显式规则
      no_match_fallback: line_01_walkman_in_pocket_1985  # UP-20260715-020 显式兜底
      algorithm: |
        1. NPC Agent 拉取玩家本局触发的所有 causal_seed 列表
           （from player_action.evidenceIds + npc_raised_echoes + belief_matrix.memoryRefs）
        2. 对 candidate_lines 按 priority 升序遍历，找到第一个
           seed_id / referenced_seed 在玩家触发列表里的 line
        3. 若多触发：取 priority 最小（即"最触动"）的那条
        4. 若无任何 candidate 匹配：AI 导演必须使用 line_01_walkman_in_pocket_1985 兜底
        5. 决策 2 补充条款：第一句台词必须引用 player 在 1985/1986/1989 的具体行为（不允许泛化叙述）
           —— 禁止自由发挥台词
      red_line: "AI 导演不得在 candidate_lines 之外创造台词"

