# -----------------------------------------------------------------------------
# 因果种子：本场景行为会触发哪些远期回响
# -----------------------------------------------------------------------------
causal_seeds:
  # ----- UP-20260715-015：1985/1986/1989 行为种子（决策 2 补充条款引用目标） -----
  # 这 5 个种子在更早的 1985/1986/1989 时代已经被触发，
  # 通过 carried_seeds 一路保留到 2011 机场；5 句备选台词按 selection_rule 匹配。
  - id: walkman_in_pocket_1985
    description: 1985 年阿拉什把 walkman 留在莱拉那边
    trigger: 历史（被 carried_seeds 带入 2011）
    effects:
      - 锚点 1 2011 机场，阿拉什提起 walkman 仍在他手中
      - 锚点 2 2024 重逢，阿拉什胸口口袋里仍是那台 walkman

  - id: postcard_moscow_vienna
    description: 1986 年莱拉从莫斯科寄维也纳的明信片
    trigger: 历史（被 carried_seeds 带入 2011）
    effects:
      - 锚点 1 2011 机场，阿拉什从外套内袋摸出那张明信片
      - 锚点 2 2024 重逢，桌面上明信片正面朝下

  - id: grip_then_release_1985
    description: 1985 年莱拉与阿拉什在听琴那晚握—松
    trigger: 历史（被 carried_seeds 带入 2011）
    effects:
      - 锚点 1 2011 机场，莱拉握完手后的手指还停在阿拉什袖口
      - 锚点 2 2024 重逢，阿拉什端茶时拇指会先压住杯沿再松开

  - id: chocolate_wrapper_1986
    description: 1986 年阿拉什留下两颗松子糖的锡纸
    trigger: 历史（被 carried_seeds 带入 2011）
    effects:
      - 锚点 1 2011 机场，莱拉斜挎包内袋里锡纸的折角压到了照片
      - 锚点 2 2024 重逢，莱拉把照片翻到背面时锡纸仍贴着照片

  - id: arrival_postcard_1989
    description: 1989 年阿拉什寄到琴行的"我到了"明信片
    trigger: 历史（被 carried_seeds 带入 2011）
    effects:
      - 锚点 1 2011 机场，阿拉什胸口口袋仍夹着那张明信片
      - 锚点 2 2024 重逢，咖啡桌桌面那张明信片背面的邮戳是 1989

  - id: name_of_kamran_spoken
    description: 莱拉在机场把卡姆兰的名字、婚姻、机票三件事一次说完
    trigger: 玩家对 envelope_kamran 执行 reveal + give（让名字从信封里出来）
    effects:
      - 锚点 1 2024 路口，莱拉会先说"卡姆兰正在等我"
      - 锚点 2 2024 重逢，莱拉不再保留"我过得好"那种半句话
      - 锚点 3 2024 阿拉什的诗集里那张照片旁边会多一张纸——莱拉 2011 留下的最后一句

  - id: name_of_kamran_concealed
    description: 莱拉只说航班已确定，把卡姆兰的名字留在信封里
    trigger: 玩家对 envelope_kamran 执行 conceal + destroy（把信封滑回文件袋）
    effects:
      - 锚点 1 2024 路口，莱拉会先说"卡姆兰正在等我"——但声音比 truth 路线更轻
      - 锚点 2 2024 重逢，莱拉会用"我过得好"那种半句话回答
      - 锚点 3 2024 阿拉什合上诗集时会犹豫要不要问她还留着那张照片

  - id: escape_asked_in_2011
    description: 莱拉最后问了一次"我们能不能一起找另一条路"
    trigger: 玩家对 arash 执行 question + confront + promise
    effects:
      - 锚点 1 2024 重逢，阿拉什会主动承认"我当时没有接住"
      - 锚点 2 2024 路口，阿拉什先抽出外套口袋里的公交票又滑回去

  - id: bus_ticket_pair_unused
    description: 阿拉什仍带着 2008 那两张 304 公交票
    trigger: bus_ticket_pair_2011 enabled + 玩家对 arash 执行 give（让公交票留在阿拉什手中）
    effects:
      - 锚点 1 2024 路口，阿拉什在绿灯前"把手从外套口袋里抽出来"
      - 锚点 2 2024 重逢，公交票仍夹在诗集末页
      - 锚点 3 2024 莱拉在路口先看见机场方向牌

  - id: luggage_tag_carries_truth
    description: 莱拉在行李牌背面写下一行不属于航空公司的字符
    trigger: 玩家对 luggage_tag 执行 give（在背面写）
    effects:
      - 锚点 1 2024 莱拉在伊斯坦布尔会再次摸到行李牌的硬边
      - 锚点 2 2024 咖啡馆桌上，莱拉会放下行李牌，让 2011 那行字对向灯光

  - id: luggage_tag_silent
    description: 莱拉不写任何字，只把行李牌翻到正面
    trigger: 玩家对 luggage_tag 执行 wait
    effects:
      - 锚点 1 2024 莱拉不会主动摸行李牌
      - 锚点 2 2024 桌面上不会出现行李牌

  - id: grip_then_release_2011
    description: 莱拉与阿拉什在最后握了一下手，又松开（2008 握—松的 13 年后回响）
    trigger: 玩家对 rolling_suitcase 或 arash_old_jacket 执行 comfort + silence
    effects:
      - 锚点 1 2024 重逢，咖啡馆灯闪时两人没有再靠近
      - 锚点 2 2024 阿拉什端茶时会用拇指摩挲杯沿

  - id: i_arrived_text
    description: 阿拉什在登机广播响起前发来那条"我到了"
    trigger: 玩家对 airport_clock 或 announcement_speaker 执行 wait
    effects:
      - 锚点 1 2024 重逢，阿拉什会用同样的三个字代替"你好"
      - 锚点 2 2024 莱拉手机在咖啡馆会亮起——只是一条 13 年前的旧短信的提醒

  - id: photo_2008_inherited_to_2024
