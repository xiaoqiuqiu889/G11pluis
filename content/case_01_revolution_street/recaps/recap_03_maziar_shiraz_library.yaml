recap_meta:
  duration_seconds: 285                # 7 幕 × 40-45 秒 = ≤ 5 分钟
  max_main_llm_calls: 5
  single_call_output_tokens: 200
  scene_count: 7
  cost_budget_note: |
    本短案所有 7 幕共享 ≤ 5 次主调用。LLM 在客户端触发
    recap_started 后调用一次（聚合生成）。客户端 montage
    期间 0 LLM 调用。
  player_invitation: |
    本短案只在 reunion_2024 路口分开后出现；玩家点 × 后 7 天
    内不再主动推送。

# -----------------------------------------------------------------------------
# 固定锚点
# -----------------------------------------------------------------------------
required_anchors:
  - 锚点 1：玛兹雅 1989 第一次走进设拉子儿童图书馆
  - 锚点 2：她的借阅登记本记了 11 年的手写日期
  - 锚点 3：哈菲兹诗集是借阅次数最多的书（被撕去一页的那本）
  - 锚点 4：她 2000 年最后一次走进图书馆，把撕去的那一页夹在借阅登记本里
  - 锚点 5：撕去的那一页后来在 2009 年随一封信寄给莱拉
  - 锚点 6：reunion_2024 桌面上"两件共鸣物件"之一就是这封信
  - 锚点 7：7 幕必须按年份顺序（1989 / 1991 / 1993 / 1995 / 1997 / 1999 / 2000）

# -----------------------------------------------------------------------------
# 核心冲突
# -----------------------------------------------------------------------------
core_conflict:
  - 冲突 1：玛兹雅为何在 2000 撕下那一页寄给莱拉——她认识莱拉吗？
  - 冲突 2：她撕下那页后是否知道"13 年后那封信会出现在伊斯坦布尔"
  - 冲突 3：图书馆的 11 年与革命街主线的 13 年（1995-2008）是平行轨道
            还是同一条

# -----------------------------------------------------------------------------
# 行为白名单
# -----------------------------------------------------------------------------
allowed_beats:
  - 第一次走进图书馆
  - 把名字写进借阅登记本
  - 把哈菲兹诗集翻开
  - 把借阅卡塞进书页
  - 撕下一页
  - 把撕下的页夹进信封
  - 把信封寄出
  - 把借阅登记本合上

# -----------------------------------------------------------------------------
# 禁止揭露
# -----------------------------------------------------------------------------
forbidden_reveals:
  - 莱拉 2008 / 2011 / 2024 的具体行为
  - 阿拉什 2008 / 2011 / 2024 的具体行为
  - 玛兹雅与莱拉的相识经过
  - 玛兹雅 2009 之后的生活
  - 玛兹雅与阿拉什 / 玛丽亚姆的任何关系
  - 撕下那一页的具体内容（"什么诗"必须留白）
  - 撕下那封信的具体邮寄路径
  - reunion_2024 的具体场景细节（除"那封信在桌上"外）
  - 玩家在 reunion_2024 触发的具体 mandatory_echo
  - 任何"13 年后她读到这页"的因果叙述

