mandatory_echoes:
  - id: recap_03_torn_page_letter
    description: 玛兹雅 1997 撕下哈菲兹一页 → 1999 夹进信封 → 2009 寄给莱拉 → 2024 reunion 桌上有
    trigger: 玩家点开 act_05_1997 或 act_06_1999
    target_scenes: [recap_03_maziar_shiraz_library, reunion_2024]
    ai_director_must_invoke: true
    references_2024: [reunion_2024.cafe_table]   # reunion_2024 桌面的两件共鸣物件之一
    ai_director_constraint: |
      玛兹雅 1997 撕页时不知道这页会寄给谁，也不知道 2024 它会在
      伊斯坦布尔桌上。导演只允许"她撕下，没给谁"与"信封没贴邮票"
      在场；不得加任何"13 年后她读到"式叙述。

  - id: recap_03_register_closed
    description: 玛兹雅 2000 合上借阅登记本 → reunion_2024 路口合上诗集
    trigger: 玩家点开 act_07_2000
    target_scenes: [recap_03_maziar_shiraz_library, reunion_2024]
    ai_director_must_invoke: true
    references_2024: [reunion_2024.seed.crossroads_parting]
    ai_director_constraint: |
      玛兹雅合上借阅登记本的动作是"她关上了她的工作"，与 reunion_2024
      阿拉什合上诗集是同款视觉语言但不是同一双手。导演不得做类比。

