# 写入规范：UTF-8；YAML 1.2；所有中文为正文。
# =============================================================================

scene_id: recap_03_maziar_shiraz_library
title: 玛兹雅 1989-2000 · 设拉子儿童图书馆
era: "EPILOGUE"
location: 伊朗·设拉子·儿童图书馆·二楼借阅柜台
atmosphere:
  - 旧木地板
  - 借阅登记本
  - 哈菲兹诗集
  - 借阅卡上手写日期
  - 玛兹雅的圆框眼镜
  - 角落的绿色台灯
  - 早晨的光
  - 偶尔的钟声
  - 雨后泥土味

