# 验收（按经验教训"四项问题"自检）
# -----------------------------------------------------------------------------
verification:
  - changes_world_state: false       # 1995 是过去时，不改本局世界状态
  - changes_character_knowledge: true # 玩家看到 1995 莱拉的状态后，对 reunion_2024 物件产生新理解
  - changes_available_actions: false  # 短案只读，不改可用行为
  - creates_future_echo: false        # 短案是反向回溯，不产生新回响
  - preserves_macro_endpoints: true   # 2008 / 2011 / 2024 端点不动
  - forbidden_reveals_strict: true    # 不泄露 2008 / 2011 / 2024 具体行为
  - cross_references_safe: true       # 必触发回响只用 "物件在场" 方式呈现
  - duration_under_5_minutes: true    # 5 幕 × 60 秒 ≤ 5 分钟
  - 0_state_machine_changes: true     # 不改 state_machine
  - 0_agents_changes: true            # 不改 agents
  - 0_model_changes: true             # 不改 model
  - 0_safety_changes: true            # 不改 safety
  - reuses_W3_W4_only: true           # 只走 W3 / W4 已交付能力

