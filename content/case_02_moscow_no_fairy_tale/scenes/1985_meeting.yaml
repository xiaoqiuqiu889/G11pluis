# =============================================================================
# 第二案 · 《莫斯科没有童话》 · 场景 1 / 3
# 1985_meeting（莫斯科音乐学院 · 老柴院 305 琴房）
# -----------------------------------------------------------------------------
# 时代：1985 年秋，戈尔巴乔夫上任 6 个月
# 锚点说明：这是 anchors.yaml 锚点 1 的纵切片
# 母题对位（与第一案 photo_lab_2008 同结构）：
#   第一案"两张同版毕业照"  →  第二案"两份同版手抄谱"
#   第一案"诗集"            →  第二案"红色笔记本"
#   第一案"邮件"            →  第二案"未寄出的磁带"
# 跨年代回响：必须影响 1989_离别（锚点 3）和 2008_重逢（锚点 5）两个场景
# 写入规范：UTF-8；YAML 1.2；不修改 schemas
# =============================================================================

# === schema 必填字段（narrative_contract.schema.json）====================
sceneId: scene_1985_meeting
title: 莫斯科音乐学院 · 305 琴房与两份同版手抄谱
era: "1985"
location: 莫斯科音乐学院 · 老柴院（Bolshaya Nikitskaya 13）· 305 琴房
timeOfDay: evening
weather: unspecified
narratorVoice: |
  第三人称限制视角跟随娜塔莎；
  句式以大提琴与立式钢琴的物理意象为主；
  不使用 1985 之后才出现的词（如"克格勃"全名、"解体"）。

# -----------------------------------------------------------------------------
# schema 必填：required_anchors（每个 anchorId 必填 description）
# -----------------------------------------------------------------------------
required_anchors:
  - anchorId: 305_room
    description: 305 琴房确实存在，窗下摆 1978 年产 Yamaha U3 立式钢琴
    mandatory: true
  - anchorId: op38_a_minor
    description: 排练曲目是肖斯塔科维奇 a 小调大提琴与钢琴奏鸣曲 Op.38（1934 首演）
    mandatory: true
  - anchorId: ilya_berman_pencil
    description: 伊利亚在总谱上用铅笔圈三个小节并签"И. Б."（伊利亚·贝尔曼的姓名首字母）
    mandatory: true
  - anchorId: natasha_first_not_absent
    description: '娜塔莎在第二乐章中段说"给一个不在场的人"——这是她第一次把"不在场"说出口'
    mandatory: true
  - anchorId: petroff_rosin_stain
    description: Petrof 1962 大提琴的松香渍留在 Yamaha U3 中央 C 键上
    mandatory: true
  - anchorId: copy_offer_1985_11_07
    description: 11 月 7 日十月革命节前夜伊利亚提出"抄一份给你"——这是锚点 3 行李物件的种子
    mandatory: true
  - anchorId: 1985_setting_lock
    description: 时代 1985 锁定：苏联晚期、莫斯科音乐学院、文化部尚未注意到他们
    mandatory: true
  - anchorId: macro_endpoint_unmet
    description: 锚点 1 不锁任何宏观端点；所有 5 个端点在锚点 2-5 才固定
    mandatory: true
  - anchorId: far_echo_preparation
    description: 场景必须为 1989_离别 准备至少一种"可被远期回响捡到的物件/口信"
    mandatory: true

# -----------------------------------------------------------------------------
# schema 必填：core_conflict
# -----------------------------------------------------------------------------
core_conflict: |
  305 琴房里立式钢琴前只有两个人、一份总谱。
  伊利亚用铅笔圈三个小节并签"И. Б."——他承认这是他问的；
  娜塔莎答"给一个不在场的人"——她第一次把"不在场"说出口。
  核心张力是：两个人用同一份总谱共处两周，
  但总谱只能由一人带离琴房。
  玩家决定的是：谁带总谱、另一份"抄"得怎么开始、谁先说"你留"。

# -----------------------------------------------------------------------------
# schema 必填：allowed_beats（每项必填 beatId, label, tier）
# -----------------------------------------------------------------------------
allowed_beats:
  - beatId: opening_first_measure
    label: 开场第一小节（Y Yamaha U3 发出低音 110 Hz）
    tier: setup
  - beatId: petrof_schellack_stain
    label: 娜塔莎的 Petrof 大提琴松香渍在中央 C 键
    tier: setup
  - beatId: ilya_pencil_circles
    label: 伊利亚用铅笔圈三个小节并签"И. Б."
    tier: rising
  - beatId: natasha_first_not_absent
    label: 娜塔莎说"给一个不在场的人"
    tier: rising
  - beatId: 21_40_door_knock
    label: 21:40 琴房管理员敲门
    tier: climax
  - beatId: copy_offer_nov_7
    label: 11 月 7 日前夜"抄一份给你"
    tier: falling
  - beatId: parting_at_door
    label: 两人各自离开
    tier: resolution

# -----------------------------------------------------------------------------
# schema 必填：forbidden_reveals（每项必填 revealKey, reason）
# -----------------------------------------------------------------------------
forbidden_reveals:
  - revealKey: ilya_1989_emigration
    reason: 1989 移民属锚点 3 宏观端点，锚点 1 不能泄露
  - revealKey: natasha_1988_warning
    reason: 1988 处分属锚点 2 后果，锚点 1 不能泄露
  - revealKey: sasha_natasha_marriage
    reason: 萨沙与娜塔莎 1993 结婚属锚点 4，锚点 1 不能泄露
  - revealKey: lisa_vienna
    reason: 莉莎 1986 西柏林出场，锚点 1 不能泄露
  - revealKey: anya_1994_birth
    reason: 阿尼娅 1994 出生，锚点 1 不能泄露
  - revealKey: reichenberg_op38_2008
    reason: 2008 柏林爱乐重逢属锚点 5，锚点 1 不能泄露
  - revealKey: here_is_no_fairy_tale
    reason: 1987 创作《这里没有童话》属锚点 2，锚点 1 不能泄露
  - revealKey: post_soviet_dissolution
    reason: 苏联解体属锚点 4 背景，锚点 1 不能泄露

# -----------------------------------------------------------------------------
# schema 必填：max_turns + total_action_budget
# -----------------------------------------------------------------------------
max_turns: 12
total_action_budget: 30

# -----------------------------------------------------------------------------
# schema 必填：legal_endings（每项必填 endingId, label, conditions；可选 tone）
# -----------------------------------------------------------------------------
legal_endings:
  - endingId: ending_pencil_admit
    label: 铅笔圈注承认
    description: 伊利亚把"И. Б."圈注页撕下夹在红色笔记本里——他承认这是他问的
    conditions:
      - player_action.reveal.completed == true
      - causal_seed.ilya_pencil_page_in_notebook.fired == true
    tone: bittersweet
  - endingId: ending_pencil_silent
    label: 铅笔圈注沉默
    description: 伊利亚不撕页，让总谱留在 305 琴房——他压制"我承认"
    conditions:
      - player_action.conceal.completed == true
      - causal_seed.manuscript_stays_in_305.fired == true
    tone: sober
  - endingId: ending_copy_offer
    label: "抄一份给你"
    description: 伊利亚在 11 月 7 日前夜把总谱交给娜塔莎"你留"
    conditions:
      - player_action.give.completed == true
      - causal_seed.natasha_keeps_manuscript.fired == true
    tone: ambiguous
  - endingId: ending_parting_at_door
    label: 两人各自离开
    description: 21:40 琴房管理员敲门后两人各自离开
    conditions:
      - beat.parting_at_door.fired == true
    tone: open
  - endingId: ending_first_not_absent
    label: 第一次把"不在场"说出口
    description: 娜塔莎在第二乐章中段说"给一个不在场的人"——场景在此收束
    conditions:
      - beat.natasha_first_not_absent.fired == true
    tone: open

