    tier: setup
  - beatId: ilya_glance_at_notebook
    label: 伊利亚在海关柜台前看红色笔记本（翻或不翻）
    tier: rising
  - beatId: 5_55_phone_rings
    label: 5:55 莉莎打电话给娜塔莎
    tier: climax
  - beatId: 4_second_pickup
    label: 娜塔莎在 4 秒后接起电话
    tier: climax
  - beatId: third_bar_oral_message
    label: '第三小节是给你的 口信'
    tier: falling
  - beatId: 6_15_announcement
