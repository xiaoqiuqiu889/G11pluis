# =============================================================================
# 第二案 · 《莫斯科没有童话》 · 场景 2 / 3
# 1989_farewell（莫斯科谢列梅捷沃机场 · SVO-2 国际线出境大厅）
# -----------------------------------------------------------------------------
# 时代：1989 年 4 月 8 日清晨，苏联解体前 2 年
# 锚点说明：这是 anchors.yaml 锚点 3（1989 离别）的纵切片
# 母题对位（与第一案 farewell_2011 同结构）：
#   第一案"单程行李牌"   ->   第二案"Aeroflot 托运标签 SU-355"
#   第一案"我到了"短信    ->   第二案"5:55 莉莎电话里'第三小节是给你的'"
#   第一案"2008 照片"     ->   第二案"2008 红色笔记本第 7 页 Aeroflot 标签"
# 跨年代回响：必须引用 1985_meeting 的具体行为（玩家是否揭页、是否给总谱、是否让笔记本记笔记）
#           并为 2008_重逢 准备至少 2 个因果种子
# 写入规范：UTF-8；YAML 1.2；不修改 schemas
# =============================================================================

# === schema 必填字段（narrative_contract.schema.json）====================
sceneId: scene_1989_farewell
title: 莫斯科谢列梅捷沃机场 · 出境大厅与第三小节
era: "1989"
location: 莫斯科谢列梅捷沃机场 · SVO-2 国际线出境大厅
timeOfDay: dawn
weather: cold
narratorVoice: |
  双视角交叉：5:30 娜塔莎在塔甘卡剧院衣帽间 / 5:55 莉莎在 SVO-2 电话亭 / 6:15 伊利亚在登机口。
  句式以行李传送带的物理意象为主。
  不使用 1989 之后才出现的词（如"苏联解体"已发生的语境、"独联体"）。

# -----------------------------------------------------------------------------
# schema 必填：required_anchors
# -----------------------------------------------------------------------------
required_anchors:
  - anchorId: svo2_departure_lounge
    description: 场景设定在 SVO-2 国际线出境大厅，必须出现值机柜台、行李传送带、抽象航班板
    mandatory: true
  - anchorId: ilya_lisa_1986_west_berlin
    description: 莉莎 1986 年在西柏林认识伊利亚——她是"中介者"
    mandatory: true
  - anchorId: natasha_not_at_airport
    description: 娜塔莎没去机场是出于自我保护（处分仍在 3 年观察期内）
    mandatory: true
  - anchorId: sasha_at_taganka_with_natasha
    description: 萨沙 1988 年底明确劝过娜塔莎"别去"；4 月 8 日清晨陪她在衣帽间到 5:30
    mandatory: true
  - anchorId: lisa_calls_at_5_55
    description: 5:55 莉莎打电话给娜塔莎传话"第三小节是给你的"
    mandatory: true
  - anchorId: su355_takeoff_6_15
    description: SU-355 班机 6:15 起飞，经布拉格转机飞往维也纳
    mandatory: true
  - anchorId: aeroflot_tag_visible
    description: Aeroflot 托运标签"SU-355 / 1989-04-08 / SVO-PRG-VIE"在行李上
    mandatory: true
  - anchorId: scene_must_reference_1985
    description: 场景必须显式引用 1985_meeting 至少一项具体行为（玩家行为）
    mandatory: true
  - anchorId: scene_must_prepare_2008
    description: 场景必须为 2008_reunion 准备至少 2 个因果种子
    mandatory: true
  - anchorId: announcement_before_end
    description: 6:15 登机广播在场景结束前必须响起（替代第一案"机场登机广播"）
    mandatory: true
  - anchorId: parting_endpoint_locked
    description: 场景结束于"分别"——伊利亚和莉莎登机，娜塔莎在塔甘卡衣帽间，不被任何承诺改写
    mandatory: true

# -----------------------------------------------------------------------------
# schema 必填：core_conflict
# -----------------------------------------------------------------------------
core_conflict: |
  莫斯科谢列梅捷沃机场 5:30—6:15 这 45 分钟里，
  萨沙陪娜塔莎在塔甘卡剧院衣帽间坐到 5:30；
  莉莎在 SVO-2 帮伊利亚托运行李；
  5:55 莉莎打电话给娜塔莎传话"第三小节是给你的"——娜塔莎在 4 秒后接起；
  6:15 SU-355 起飞。
  核心张力是：四个人分处两个地点，**通过一个 4 秒延迟的电话"同时在场"**。
  玩家决定的是：
  1) 伊利亚在海关柜台前看红色笔记本时翻到哪一页（1985 第 1 页 / 1987 第 7 页 / 不翻）；
  2) 莉莎打电话时是否多说一句（只传话 / 问"你爱他吗" / 不打）；
  3) 娜塔莎在 4 秒后接电话时是否先说话（沉默 4 秒 / 让莉莎先说 / 自己先说）。

