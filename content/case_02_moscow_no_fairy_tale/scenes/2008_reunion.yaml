max_turns: 16
total_action_budget: 36

# -----------------------------------------------------------------------------
# schema 必填：legal_endings
# -----------------------------------------------------------------------------
legal_endings:
  - endingId: ending_two_programs_align
    label: 两份节目单对齐
    description: 19:30 两份节目单（Op.38 / Op.40）在桌面对齐——两个物件都是 2008 当天沉淀的产物
    conditions:
      - player_action.give.completed == true
      - causal_seed.two_programs_takeout_compare.fired == true
    tone: bittersweet
  - endingId: ending_first_words_admit
    label: 第一句话承认 1985/1989
    description: '19:15 桌边伊利亚主动承认"我让莉莎在 5:55 传话"或娜塔莎承认"我在 4 秒后接电话"'
    conditions:
      - player_action.reveal.completed == true
      - causal_seed.first_words_admit_1985_1989.fired == true
    tone: bittersweet
  - endingId: ending_postcard_unveiled
    label: 1995 明信片被打开
    description: 20:00 1995 维也纳未寄出的明信片被打开——13 年后兑现
    conditions:
      - player_action.investigate.completed == true
      - causal_seed.postcard_wien_1995_unveiled.fired == true
    tone: bittersweet
  - endingId: ending_crossroads_parting
    label: 街口分开
    description: 21:05 红灯变绿，两人走向不同方向，又在同一刻回头笑一下
    conditions:
      - beat.21_05_red_to_green.fired == true
      - beat.simultaneous_turn_and_smile.fired == true
    tone: open
  - endingId: ending_silent_keeping
    label: 沉默带过
    description: 娜塔莎与伊利亚没有把 1989 那一夜 / 1995 维也纳 4 秒对视的真相说出口
    conditions:
      - player_action.silence.completed == true
    tone: sober
  - endingId: ending_reality_lives_convergence
    label: 现实生活共同收束
    description: 21:06 伊利亚打电话给莉莎 / 21:08 娜塔莎发短信给萨沙
    conditions:
      - beat.ilya_calls_lisa_cloud.fired == true
      - beat.natasha_texts_sasha_i_arrived.fired == true
    tone: open

