# =============================================================================
# 第二案 · 《莫斯科没有童话》 · 场景 3 / 3
# 2008_reunion（柏林 · 十字山区 · 老式咖啡馆 + U1 线 Kreuzberg 站街口）
# -----------------------------------------------------------------------------
# 时代：2008 年 11 月 15 日周六傍晚，柏林
# 锚点说明：这是 anchors.yaml 锚点 5（2008 重逢）的纵切片
# 母题对位（与第一案 reunion_2024 同结构）：
#   第一案"两张同版毕业照"  →  第二案"两份肖斯塔科维奇独奏会节目单"
#   第一案"诗集"            →  第二案"红色笔记本"
#   第一案"邮件"            →  第二案"1995 未寄出的明信片"
#   第一案"重逢视线"        →  第二案"Op.38 演奏的多弹 4 小节"
#   第一案"伊斯坦布尔路口"  →  第二案"U1 线 Kreuzberg 站街口"
# 跨年代回响：必须显式引用 1985_meeting 与 1989_farewell 的具体行为
#           NPC 必须主动提起玩家在 1985 / 1989 的具体动作
#           远期回响在这里收束
# 写入规范：UTF-8；YAML 1.2；不修改 schemas
# =============================================================================

# === schema 必填字段（narrative_contract.schema.json）====================
sceneId: scene_2008_reunion
title: 柏林 · 十字山区老式咖啡馆与 U1 线街口
era: "2008"
location: 德国·柏林·十字山区（Kreuzberg）· 老式咖啡馆 + U1 线地铁站街口
timeOfDay: evening
weather: rain
narratorVoice: |
  第三人称限制视角跟随娜塔莎与伊利亚的双重视角交替；
  句式以瓷器与立式钢琴延音踏板余音的物理意象为主；
  2008 时点已可以使用"克格勃"作为历史词，但需注明语境。

# -----------------------------------------------------------------------------
# schema 必填：required_anchors
# -----------------------------------------------------------------------------
required_anchors:
  - anchorId: kreuzberg_cafe_setting
    description: 场景设定在十字山区老式咖啡馆，雨后，桌上有两份节目单与一张明信片
    mandatory: true
  - anchorId: middle_aged_versions
    description: 娜塔莎 44 岁 / 伊利亚 46 岁的中年版本（蜂蜜色眼睛 + 深绿高领 / 卷发 + 鬓角灰白 + 圆框眼镜）
    mandatory: true
  - anchorId: ilya_brings_red_notebook
    description: 伊利亚推门而入时臂弯抱红色笔记本
    mandatory: true
  - anchorId: natasha_phone_keeps_1989_text
    description: '娜塔莎手机里仍残留 1989 那条"5:55 电话"记忆（替代第一案"我到了短信"）'
    mandatory: true
  - anchorId: anya_crayon_star_on_manuscript
    description: 娜塔莎斜挎包里的 Op.38 手抄谱封底有阿尼娅 1995 蜡笔歪斜红星
    mandatory: true
  - anchorId: postcard_wien_1995_on_table
    description: 1995 未寄出的明信片在咖啡馆桌面被打开
    mandatory: true
  - anchorId: scene_must_reference_1985_1989
    description: 场景必须显式引用 1985_meeting 与 1989_farewell 至少各一项具体行为
    mandatory: true
  - anchorId: npc_actively_recalls
    description: NPC 必须主动提起玩家 1985 / 1989 的具体行为（不是玩家主动暴露）
    mandatory: true
  - anchorId: scene_ends_at_crossing
    description: 场景结束于 U1 线 Kreuzberg 站街口，红灯变绿，两人走向不同方向
    mandatory: true
  - anchorId: convergence_complete
    description: 远期回响在这里收束（far_echo_routes 列表可以为空，但 convergence_summary 必填）
    mandatory: true
  - anchorId: spouses_remote_present
    description: 萨沙与莉莎在远程处存在（电话 / 短信 / 未接来电），不直接出场
    mandatory: true

# -----------------------------------------------------------------------------
# schema 必填：core_conflict
# -----------------------------------------------------------------------------
core_conflict: |
  19 年后的柏林十字山区，桌上有两份肖斯塔科维奇独奏会节目单、
  伊利亚的红色笔记本、娜塔莎斜挎包里的手抄谱、1995 未寄出的明信片。
  核心张力是：
  1) 第一眼落在哪里（中央 C 键松香渍 / 红色笔记本第 7 页 / 时钟与 U-Bahn 方向牌）；
  2) 是否把两张节目单对齐（替代第一案"两张同版毕业照对齐"）；
  3) 是否在 21:05 街口把"萨沙在莫斯科"说出来（替代第一案"卡姆兰正在等我"）；
  4) 是否承认 1989 那一夜 / 1995 维也纳对视 4 秒的具体行为。

