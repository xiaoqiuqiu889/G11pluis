    label: 18:50 娜塔莎到十字山区老式咖啡馆
    tier: setup
  - beatId: ilya_enters_with_notebook
    label: 19:15 伊利亚抱红色笔记本推门
    tier: rising
  - beatId: first_gaze_choice
    label: 19:15 娜塔莎第一眼选择（中央 C 键 / 第 7 页 / 时钟与 U-Bahn 方向牌）
    tier: rising
  - beatId: two_programs_align
    label: 19:30 两份节目单对齐
    tier: climax
  - beatId: red_notebook_page_7_visible
    label: 19:45 红色笔记本第 7 页胶带痕迹可见
    tier: climax
  - beatId: postcard_wien_1995_on_table
    label: 20:00 1995 未寄出的明信片被打开
    tier: falling
  - beatId: 21_00_walk_to_u1
    label: 21:00 两人走到 U1 线 Kreuzberg 站街口
    tier: falling
  - beatId: 21_05_red_to_green
    label: 21:05 红灯变绿
    tier: resolution
  - beatId: simultaneous_turn_and_smile
    label: 两人在同一刻回头笑一下
    tier: resolution
  - beatId: ilya_calls_lisa_cloud
    label: 21:06 伊利亚打电话给莉莎："今晚云不遮德意志歌剧院的屋顶"
    tier: resolution
  - beatId: natasha_texts_sasha_i_arrived
    label: 21:08 娜塔莎发短信给萨沙："我到了。今晚不回莫斯科。后天飞"
    tier: resolution

