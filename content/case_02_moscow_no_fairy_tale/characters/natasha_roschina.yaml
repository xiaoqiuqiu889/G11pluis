# =============================================================================
# 第二案 · 《莫斯科没有童话》 · 角色卡 1 / 4
# 主角 1：娜塔莎·罗希娜（Natasha Roshchina）
# 俄罗斯族 · 大提琴手 · 莫斯科 → 莫斯科（终身居住）· 1985 年 21 岁 / 2008 年 44 岁
# 与第一案莱拉同结构：女主、主视角承担者、文学艺术系（音乐学院）毕业
# =============================================================================

characterId: natasha_roschina
name_zh: 娜塔莎·罗希娜
name_ru: "Наталья 'Наташа' Рощина"
name_short: Natasha
gender: female
nationality_1985: 苏联·俄罗斯族
nationality_2008: 俄罗斯联邦
role: protagonist
role_note: 与第一案莱拉对位；记忆修复者的核心承担者

# -----------------------------------------------------------------------------
# 视觉锚点（替代第一案"椭圆脸 / 深色杏仁眼 / 灰米色头巾"）
# -----------------------------------------------------------------------------
visual_anchors:
  - face_shape: 椭圆脸，颧骨高（与第一案莱拉同特征但颜色不同）
  - eyes: 蜂蜜色（1985）→ 蜂蜜色加深灰绿（2008），无第一案的"深色杏仁眼"
  - hair_1985: 浅金色卷发，常编成一根辫子搭在左肩
  - hair_2008: 剪短至耳下，灰金相间，鬓边有几缕
  - skin_tone: 苍白偏冷（莫斯科冬天少见阳光）
  - height: 168 cm
  - build: 瘦长
  - hands: 修长，右手食指指节有 1985 年大提琴拨弦留下的薄茧
  - signature_accessory_1985: 深绿色高领毛衣 + 蜂蜜色头巾
  - signature_accessory_2008: 深紫色羊毛围巾 + 深橄榄长大衣（与第一案莱拉的"灰米头巾 + 深橄榄外套"同色调但不同色相）
  - never_wears: 红色（与第一案莱拉同禁忌：避免文化符号化）
  - signature_instrument: 1962 年产捷克 Petrof 大提琴（继承自祖母）

# -----------------------------------------------------------------------------
# 锚点 1（1985 相遇）初始状态
# -----------------------------------------------------------------------------
initial_state_1985:
  age: 21
  location: 莫斯科音乐学院 · 老柴院 305 琴房
  occupation: 莫斯科音乐学院大提琴四年级学生
  relationship_status: 单身
  family:
    father: 米哈伊尔·罗希娜（Mikhail Roshchin），莫斯科汽车厂工程师
    mother: 柳德米拉·罗希娜（Lyudmila Roshchina），莫斯科艺术剧院小角色
    siblings: 无
  emotional_state: 紧张 / 期待
  core_desire: "把不在场的人演奏出来"
  core_fear: "演奏出来之后，被听见的人其实不在"
  what_she_knows_about_her_future: "她以为自己会留在莫斯科"
  what_she_doesnt_know: 1989 伊利亚离开 / 1988 她的处分 / 2008 柏林重逢
  props_held:
    - manuscript_op38_1985  # 305 琴房合排的总谱
    - cello_petrof_1962     # 继承自祖母的捷克大提琴

# -----------------------------------------------------------------------------
# 锚点 5（2008 重逢）状态
# -----------------------------------------------------------------------------
state_2008:
  age: 44
  location: 莫斯科 · 阿尔巴特街附近公寓（自 1993 起）
  occupation: 莫斯科国家交响乐团 · 大提琴副首席（自 2003 起）
  relationship_status: 已婚
  spouse: sasha_kuzmin  # 萨沙·库兹明
  children:
    - id: anya_kuzmina
      name_zh: 阿尼娅·库兹明娜
      name_ru: Аня Кузьмина
      birth_date: 1994-01-12
      age_2008: 14
      current_occupation: 莫斯科音乐学院附中 · 大提琴专业入学考试准备
  emotional_state: 平静 / 略带疲倦
  what_she_carries_to_berlin:
    - manuscript_op38_1985  # 1985 的那份手抄谱（继承自 1985）
    - manuscript_op38_cover_back  # 阿尼娅 1995 的蜡笔红星
  what_she_doesnt_carry:
    - red_notebook          # 在伊利亚手里
    - cassette_tape         # 在伊利亚手里
    - postcard_wien_1995    # 在她钱包里（隐藏）

# -----------------------------------------------------------------------------
# 与第一案莱拉的同结构对位
# -----------------------------------------------------------------------------
case_01_parallel:
  leila_2008: 文学系学生 → 摄影的诗的地铁的
  natasha_1985: 音乐学院大提琴四年级学生 → 305 琴房的 Op.38 的立式钢琴
  differences:
    - 莱拉是"看见物件的眼睛"（照片 / 诗集 / 邮件）→ 娜塔莎是"听见物件的耳朵"（手抄谱 / 磁带 / 笔记本）
    - 莱拉的"在革命街"是地理 → 娜塔莎的"在莫斯科音乐学院"是制度（学院 / 剧院 / 文化部）
    - 莱拉离开的代价是爱情 → 娜塔莎留下来的代价是处分

# -----------------------------------------------------------------------------
# 信念矩阵（首轮种子，由 Resolver 在锚点 1 起点写入）
# -----------------------------------------------------------------------------
initial_beliefs:
  about_ilya: certain       # 她相信伊利亚会留在莫斯科
  about_music: certain      # 她相信"大提琴是给不在场的人演奏的"
  about_authority: uncertain  # 她不确定文化部是否会注意到她
  about_future: certain     # 她以为会留在莫斯科
  about_father: certain     # 父亲是稳定的存在

# -----------------------------------------------------------------------------
# 12 行为词汇适配（与第一案完全相同，证明 schema 强制下的可规模化）
# -----------------------------------------------------------------------------
behavioral_patterns:
  primary: [question, comfort, give, wait, silence]
  secondary: [investigate, reveal, conceal, confront]
  rarely: [destroy, leave]  # 娜塔莎不擅长 destroy（她保留）和 leave（她留下）

# -----------------------------------------------------------------------------
# 备注
# -----------------------------------------------------------------------------
notes:
  - "娜塔莎是'留下的人'——她的'活下去'轴就是'继续演奏'。她所有行为围绕'留下'展开"
  - "她的'留住'是物件层：手抄谱、磁带、红色笔记本（虽然在她手里的时候少）"
  - "她从不说'我爱你'——只说'第三小节是给你的'的对应物（2008 桌面说'第一页我没撕'）"
  - "1985 与 2008 的声音对比：1985 立式钢琴延音踏板余音；2008 柏林咖啡馆瓷器声"
