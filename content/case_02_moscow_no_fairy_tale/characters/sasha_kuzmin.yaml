# -----------------------------------------------------------------------------
# 与第一案卡姆兰的同结构对位
# -----------------------------------------------------------------------------
case_01_parallel:
  kamran_2008: 圣何塞 · 软件工程师 · 摄影爱好者 · 视频通话引荐
  sasha_1987: 莫斯科 · 戏剧导演 · 塔甘卡剧院 · 排练棚引荐
  differences:
  - 卡姆兰的"结婚"是"我帮你离开"（圣何塞）→ 萨沙的"结婚"是"我陪你留下"（莫斯科）
  - 卡姆兰的连接是"湾区停车场底片" → 萨沙的连接是"剧院后台衣钩"
  - 卡姆兰在 2008 远程（圣何塞）→ 萨沙在 2008 远程（莫斯科陪阿尼娅）
  - 卡姆兰接受"她不删掉过去"（暗房冲洗）→ 萨沙接受"她把旧物放在第三格书架"（不问她）
  - 萨沙劝娜塔莎 1989 不去送行——他比卡姆兰更早承担"我可能利用她"的道德负担

