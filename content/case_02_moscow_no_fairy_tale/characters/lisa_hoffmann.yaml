# =============================================================================
# 第二案 · 《莫斯科没有童话》 · 角色卡 4 / 4
# 配偶 2：莉莎·霍夫曼（Lisa Hoffmann）
# 俄德混血 · 指挥家助手 · 维也纳 · 1986 年 19 岁 / 2008 年 38 岁
# 与第一案玛丽亚姆（Maryam）同结构：男主在维也纳的妻子、远距离陪伴
# =============================================================================

characterId: lisa_hoffmann
name_zh: 莉莎·霍夫曼
name_ru_de: "Лиза Хоффманн"
name_short: Lisa
gender: female
nationality: 俄德混血（母亲是圣彼得堡人，父亲是慕尼黑人）
role: spouse_of_protagonist
role_note: 与第一案 Maryam 同结构：男主在维也纳的妻子，远程陪伴

# -----------------------------------------------------------------------------
# 视觉锚点
# -----------------------------------------------------------------------------
visual_anchors:
  - face_shape: 长椭圆脸（与娜塔莎对位），鼻梁细长（德裔）
  - eyes: 灰绿色（混血典型）
  - hair: 红金色长卷发（1986）→ 仍是红金色但剪短至肩（2008）
  - skin_tone: 偏白（与娜塔莎同色相但更红润）
  - height: 172 cm
  - build: 修长
  - signature_accessory: 银制小十字架项链（母亲的）+ 旧皮手套
  - style: 总穿高领毛衣 + 长大衣，说话时轻笑声多
  - voice: 中低音，德语带轻微俄语口音

# -----------------------------------------------------------------------------
# 锚点 3（1989 离别）首次正式出场
# -----------------------------------------------------------------------------
initial_state_1989:
  age: 22
  location: 莫斯科谢列梅捷沃机场 SVO-2 → 维也纳
  occupation: 维也纳音乐与表演艺术大学（MDW）指挥硕士在读
  relationship_with_ilya: 1986 西柏林室内乐节认识，1988 在维也纳订婚
  family:
    mother: 塔季扬娜·霍夫曼（Tatyana Hoffmann），圣彼得堡人
    father: 卡尔·霍夫曼（Karl Hoffmann），慕尼黑人，工程师
  emotional_state: 紧张 / 期待
  what_she_knows_about_natasha: "莫斯科的大提琴手，伊利亚的合作者"
  what_she_doesnt_know: 娜塔莎与伊利亚的真正关系深度 / 1985 总谱上的"И. Б." 圈注
  props_held:
    - chocolate_tin_paper  # 1986 西柏林巧克力的锡纸

# -----------------------------------------------------------------------------
# 锚点 5（2008 重逢）状态
# -----------------------------------------------------------------------------
state_2008:
  age: 38
  location: 维也纳 · 第 3 区 Landstraße 公寓（与伊利亚同住）
  occupation: 维也纳国立歌剧院合唱团指挥助理
  relationship_status: 已婚
  spouse: ilya_berman
  children:
    - id: matthias_berman
      age_2008: 13
      current_status: 维也纳 · 国立中学合唱团
  emotional_state: 平稳 / 知足
  what_she_carries:
    - chocolate_tin_paper  # 1986 起一直保留
  what_she_doesnt_carry:
    - red_notebook         # 在伊利亚手里
    - cassette_tape        # 在伊利亚手里

# -----------------------------------------------------------------------------
# 与第一案玛丽亚姆的同结构对位
# -----------------------------------------------------------------------------
case_01_parallel:
  maryam_2008: 德黑兰 · 工程师/天文观测者 · 屋顶望远镜 · 流星观测表
  lisa_1986: 维也纳 · 指挥硕士 → 国立歌剧院合唱团指挥助理
  differences:
  - 玛丽亚姆的连接是"望远镜跟踪架 + 流星数据" → 莉莎的连接是"巧克力锡纸 + 床头柜"
  - 玛丽亚姆在 2008 远程（德黑兰）→ 莉莎在 2008 远程（维也纳陪马蒂亚斯）
  - 玛丽亚姆接受"阿拉什带诗集出门" → 莉莎接受"伊利亚带红色笔记本出门"
  - 玛丽亚姆问"如果那年可以重新选一次" → 莉莎不问——她接受"伊利亚的红色笔记本是过去的容器"
  - 莉莎 1989 在机场转达"第三小节是给你的"——她是"中介者"，比玛丽亚姆更直接进入男主过去的角色

# -----------------------------------------------------------------------------
# 信念矩阵（首轮种子，由 Resolver 在锚点 3 起点写入）
# -----------------------------------------------------------------------------
initial_beliefs:
  about_ilya: certain        # 她相信伊利亚
  about_natasha: uncertain    # 她不确定娜塔莎对伊利亚意味着什么
  about_marriage: certain    # 她相信伊利亚 1992 真的想和她结婚
  about_vienna: certain      # 她相信维也纳是他们的家
  about_past: certain        # 她接受伊利亚带着红色笔记本

# -----------------------------------------------------------------------------
# 12 行为词汇适配
# -----------------------------------------------------------------------------
behavioral_patterns:
  primary: [wait, comfort, give, conceal, silence]
  secondary: [question, investigate]
  rarely: [confront, destroy]

# -----------------------------------------------------------------------------
# 备注
# -----------------------------------------------------------------------------
notes:
  - "莉莎是'接过口信的人'——1989 机场电话里她说'第三小节是给你的'，把男主的话带给女主"
  - "她在 2008 不知道 1985 总谱上的'И. Б.' 圈注——她对那个笔记本第 1 页一无所知"
  - "她接受'伊利亚带红色笔记本出门'——但她不知道笔记本第 7 页的撕痕"
  - "她的'现实生活共同收束'对应玛丽亚姆的'云会不会遮住流星'：莉莎在 2008 问'今晚德意志歌剧院的屋顶看得见星星吗'"
