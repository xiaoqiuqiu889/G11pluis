  emotional_state: 平静 / 内敛
  what_he_carries_to_berlin:
    - red_notebook           # 1985 起的红色笔记本
    - sony_walkman           # 1989 带去维也纳
    - cassette_tape          # 莫斯科最后合奏磁带
    - program_op40_2008      # 2008 独奏会节目单
  what_he_doesnt_carry:
    - manuscript_op38_1985   # 在娜塔莎手里
    - postcard_wien_1995     # 在娜塔莎手里
    - chocolate_tin_paper    # 在莉莎手里

# -----------------------------------------------------------------------------
# 与第一案阿拉什的同结构对位
# -----------------------------------------------------------------------------
case_01_parallel:
  arash_2008: 物理系学生 → 工具盒 / 诗集 / 放映机
  ilya_1985: 钢琴研究生 → 红色笔记本 / 手抄谱 / 钢琴
  differences:
    - 阿拉什是"修复物件的手"（修放映机、修电脑）→ 伊利亚是"演奏物件的手"（弹琴）
    - 阿拉什的"留下"是被家庭拖累（父亲中风、复健铺）→ 伊利亚的"离开"是被制度排斥（犹太裔 + 文化部观察名单）
    - 阿拉什的远期回响通过"别松手"的身体动作 → 伊利亚的远期回响通过"第三小节"的声音
    - 阿拉什在德黑兰维修铺做工程师 → 伊利亚在维也纳做独奏家与教师

# -----------------------------------------------------------------------------
# 信念矩阵（首轮种子）
# -----------------------------------------------------------------------------
initial_beliefs:
  about_natasha: certain     # 他相信娜塔莎的演奏
  about_music: certain       # 他相信"在场的瞬间"值得被写下来
  about_authority: wrong     # 他以为音乐学院会保护他（实际上犹太裔身份反而让他受怀疑）
  about_emigration: denied   # 他否认自己有可能离开
  about_father: certain     # 父亲是他稳定的回响

# -----------------------------------------------------------------------------
# 12 行为词汇适配
# -----------------------------------------------------------------------------
behavioral_patterns:
  primary: [conceal, promise, wait, silence, give]
  secondary: [reveal, question, investigate]
  rarely: [comfort, confront]   # 伊利亚不擅长直接对质，他通过钢琴说

# -----------------------------------------------------------------------------
# 备注
# -----------------------------------------------------------------------------
notes:
  - "伊利亚是'离开的人'——他的'活下去'轴就是'带走大纲'。他所有行为围绕'带走'展开"
  - "他的'说出'是演奏层：第三小节的速度 / 红色笔记本的某一页 / 2008 演 Op.38"
  - "他从不主动对娜塔莎说'我想你'——只在 2008 桌面上把笔记本翻到第 7 页让她看见"
  - "1985 与 2008 的声音对比：1985 列宁格勒冬季的雪声 / 2008 维也纳马车铃"
