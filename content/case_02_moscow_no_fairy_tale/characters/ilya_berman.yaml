# =============================================================================
# 第二案 · 《莫斯科没有童话》 · 角色卡 2 / 4
# 主角 2：伊利亚·贝尔曼（Ilya Berman）
# 犹太裔 · 钢琴家 · 列宁格勒 → 莫斯科（1985—1989）→ 维也纳（1989—2008）· 1985 年 23 岁 / 2008 年 46 岁
# 与第一案阿拉什同结构：男主、技术型（钢琴家 vs 工科）、1989 移民
# =============================================================================

characterId: ilya_berman
name_zh: 伊利亚·贝尔曼
name_ru: "Илья Берман"
name_short: Ilya
gender: male
nationality_1985: 苏联·犹太裔
nationality_2008: 奥地利籍（1995 入籍）
role: protagonist
role_note: 与第一案阿拉什对位；男性主角，移民与离散者

# -----------------------------------------------------------------------------
# 视觉锚点（替代第一案"瘦高 / 卷黑发 / 轻胡茬"）
# -----------------------------------------------------------------------------
visual_anchors:
  - face_shape: 长椭圆脸，鼻梁高而直（犹太裔典型）
  - eyes: 深褐色（1985）→ 深褐色加深灰环（2008）
  - hair_1985: 深棕色卷发，刘海盖住前额
  - hair_2008: 卷发仍在，鬓角灰白
  - skin_tone: 苍白偏黄（列宁格勒冬天常年的）
  - height: 181 cm
  - build: 瘦削
  - hands: 修长，左手小指有 1979 年练琴时的薄茧
  - signature_accessory_1985: 黑色高领毛衣 + 圆框眼镜（无框）
  - signature_accessory_2008: 炭灰长大衣 + 圆框眼镜（仍是无框，但金属腿）
  - facial_hair_2008: 短胡茬（与第一案阿拉什同描述，但伊利亚的胡茬颜色更黑）
  - never_wears: 鲜艳颜色（与第一案阿拉什同描述：避免"被看见"的姿态）
  - signature_instrument_1985: 1972 年产俄罗斯产立式钢琴（莫斯科音乐学院 305 琴房，1989 带去维也纳）
  - signature_instrument_2008: 1923 年产 Bösendorfer 三角钢琴 Imperator 系列（维也纳自宅）

# -----------------------------------------------------------------------------
# 锚点 1（1985 相遇）初始状态
# -----------------------------------------------------------------------------
initial_state_1985:
  age: 23
  location: 莫斯科音乐学院 · 老柴院 305 琴房
  occupation: 莫斯科音乐学院钢琴研究生一年级
  origin: 列宁格勒（圣彼得堡），父亲是合唱指挥
  relationship_status: 单身
  family:
    father: 亚历山大·贝尔曼（Aleksandr Berman），列宁格勒合唱指挥
    mother: 拉里莎·贝尔曼（Larisa Berman），列宁格勒儿童钢琴教师
    siblings: 妹妹 玛莎（Masha），15 岁
  emotional_state: 试探 / 严肃
  core_desire: "把在场的瞬间写下来"
  core_fear: "写下来之后，对方不知道那是什么意思"
  what_he_knows_about_his_future: "他以为自己会回列宁格勒当钢琴教师"
  what_he_doesnt_know: 1989 移民 / 莉莎在西柏林 / 2008 柏林重逢
  props_held:
    - red_notebook         # 1985 开始有
    - manuscript_op38_1985  # 305 琴房合排的总谱

# -----------------------------------------------------------------------------
# 锚点 5（2008 重逢）状态
# -----------------------------------------------------------------------------
state_2008:
  age: 46
  location: 维也纳 · 第 3 区 Landstraße 公寓（自 1991 起）+ 柏林临时住所（巡演时）
  occupation: 自由职业钢琴家（独奏 + 室内乐 + 教学）
  relationship_status: 已婚
  spouse: lisa_hoffmann
  children:
    - id: matthias_berman
      name_zh: 马蒂亚斯·贝尔曼
      name_de: Matthias Berman
      birth_date: 1995-04-03
