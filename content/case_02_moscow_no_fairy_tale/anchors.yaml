# 5 锚点之间的"宏观端点锁定"承诺（与第一案 V5 契约同结构）
# -----------------------------------------------------------------------------
macro_endpoints_lock:
  1985_meeting:
    - 伊利亚与娜塔莎在 305 琴房确实第一次合作
    - 两人各自保持单身
  1987_creation_and_warning:
    - 《这里没有童话》1987 年 3 月确实在塔甘卡剧院首演 12 场
    - 1988 年 1 月 14 日娜塔莎确实收到"内部警告"
    - 伊利亚 1987 年 11 月第二次出国签证确实"待议"
  1989_departure:
    - 1989 年 4 月 8 日 SU-355 班机确实起飞
    - 娜塔莎确实没去机场
    - 莉莎确实在 1986 年西柏林认识伊利亚
  1995_two_cities:
    - 1992 年 5 月 9 日伊利亚与莉莎确实在维也纳结婚
    - 1993 年 9 月 18 日娜塔莎与萨沙确实在莫斯科结婚
    - 1994 年 1 月 12 日阿尼娅出生 / 1995 年 4 月 3 日马蒂亚斯出生
    - 1995 年 11 月 17 日娜塔莎在维也纳确实偶遇伊利亚
  2008_reunion:
    - 2008 年 11 月 15 日独奏会确实在柏林爱乐举行
    - 两人确实在十字山区咖啡馆见面
    - 萨沙确实在莫斯科陪阿尼娅
    - 莉莎确实在维也纳陪马蒂亚斯
    - 21:05 地铁红灯变绿

# -----------------------------------------------------------------------------
# "她没有让一种记忆替另外两种作证"——本案的收束基调句（替代第一案）
# -----------------------------------------------------------------------------
closure_phrase: |
  他没有把 Op.38 的第三小节演给任何其他大提琴手。
  她没有把那盘磁带 B 面 23:14 处的大提琴长音删掉。
  19 年前，他带着半份大纲离开；
  19 年后，她带着阿尼娅的蜡笔红星到达。
  莫斯科没有童话。维也纳也没有。
  他们从未把对方说成"那段"过去，
  ——只说"那一年的第三小节"。

