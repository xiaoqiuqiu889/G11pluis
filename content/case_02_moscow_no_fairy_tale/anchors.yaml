    label: 处分（与革命街同结构）
    case_02_form: 女主因《这里没有童话》被苏联文化部"内部警告"
    case_01_parallel: 莱拉遭到处分 / 出版社撤回工作邀请
  - id: departure
    label: 离开（与革命街同结构）
    case_02_form: 1989 男主犹太裔钢琴家携妻移民维也纳
    case_01_parallel: 莱拉 2011 飞往圣何塞
  - id: marriage
    label: 结婚（与革命街同结构）
    case_02_form: 女主 1993 嫁 Sasha / 男主 1992 娶 Lisa
    case_01_parallel: 莱拉嫁 Kamran / 阿拉什娶 Maryam
