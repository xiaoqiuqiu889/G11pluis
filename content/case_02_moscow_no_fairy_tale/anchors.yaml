    case_01_parallel: 伊斯坦布尔路口，绿灯亮起

# -----------------------------------------------------------------------------
# 5 锚点（与第一案 5 锚点同结构：相遇/转折/离散/双城/重逢）
# -----------------------------------------------------------------------------
anchors:

  - anchor_id: 1985_meeting
    era: "1985"
    label: 1985 相遇
    scene_id: scene_1985_meeting
    location: 莫斯科音乐学院 · 老柴院（Bolshaya Nikitskaya 13） · 305 琴房
    time_window: 1985 年秋，开学第二周
    macro_endpoint_locked: null
    description: |
      1985 年秋，戈尔巴乔夫刚上任 6 个月，"公开性"还没完全推开。
      莫斯科音乐学院老柴院 305 琴房。
      21 岁的娜塔莎（莫斯科本地，俄罗斯族，大提琴四年级）
      与 23 岁的伊利亚（列宁格勒犹太裔，钢琴研究生一年级）
      因为一场四手联弹/大提琴与钢琴奏鸣曲的合排第一次见面。
      排的是肖斯塔科维奇 a 小调大提琴与钢琴奏鸣曲 Op.38（作曲家自评"少年期"）。
      排练室里只一台立式钢琴、一把椅子、一份总谱。
      排到第二乐章中段，伊利亚把速度放慢了 0.3 倍，说"你这一句是唱给谁听的？"
      娜塔莎回："给一个不在场的人。"——这是她第一次把"不在场"说出口。
      排练到 21:40，琴房管理员敲门。
      两人各自离开，但那份总谱上被伊利亚用铅笔圈了三个小节，并签了"И. Б."。
      第二天娜塔莎在琴房又遇到他。两人共用同一份总谱两周，
      直到 11 月 7 日十月革命节前夜，伊利亚提出"抄一份给你"。
    fixed_objective_facts:
      - 305 琴房确实存在，立式钢琴（Yamaha U3，1978 年产）确实摆在窗下
      - 肖斯塔科维奇 Op.38 确实是 a 小调、确实是 1934 年首演
      - 'И. Б. 是伊利亚·贝尔曼（Ilya Berman）的姓名首字母缩写（犹太裔常见俄式姓名模式）'
      - 伊利亚在列宁格勒长大，父亲是合唱指挥，母亲是钢琴教师
      - 娜塔莎在莫斯科长大，父亲是工厂工程师，母亲是莫斯科艺术剧院的小角色
      - 1985 年 11 月 7 日是十月革命 68 周年（节日当天有官方彩排）
    forbidden_reveals:
      - 伊利亚 1989 移民（锚点 3）
      - 娜塔莎 1993 与 Sasha 结婚（锚点 4）
      - 《这里没有童话》1987 创作与 1988 处分（锚点 2 后果）
      - 1995 离散后两人的具体通讯状况
      - 2008 柏林重逢
    motif_anchors_planted:
      - id: two_manuscript_copies
        description: '两份手抄谱（替代第一案 两张同版毕业照）'
        canonical_asset: manuscript_op38_1985.png
      - id: notebook_first_entry
        description: 伊利亚的红色笔记本第一次出现
        object: red_notebook
      - id: piano_keys_smudge
        description: 立式钢琴的中央 C 键有 1985 娜塔莎的松香渍
        object: piano_key_schellack_stain

  - anchor_id: 1987_creation_and_warning
    era: "1987"
    label: 1987 创作
    scene_id: scene_1987_creation
    location: 莫斯科高尔基大街 · 塔甘卡剧院后台 · 排练棚
    time_window: 1987 春（创作） ->  1988 春（处分）
    macro_endpoint_locked: disciplinary_warning
    description: |
      1986—1987 冬春，伊利亚与娜塔莎的友谊从琴房延伸到剧院。
      塔甘卡剧院的青年导演 Sasha（未来的女主丈夫，但此时只是朋友）
      邀请娜塔莎为大提琴写一段配乐，为一部根据布尔加科夫《大师和玛格丽特》改的戏做现场演奏。
      戏名叫《这里没有童话》（Здесь нет сказки）。
      伊利亚负责钢琴部分，娜塔莎负责大提琴。
      1987 年 3 月首演 12 场（每周两场，共 6 周）。
      1987 年 5 月 7 日，文化部艺术委员会有人在《文学报》撰文"灰色地带"，
      指出该剧"以'无神论时代无童话'为由，对青年观众作消极暗示"。
      1988 年 1 月 14 日，文化部对娜塔莎发"内部警告"（внутреннее предупреждение）：
      不得再为任何"非官方批准"的剧目演奏，并取消了她"年内出访东欧"的申请。
      伊利亚的犹太裔身份 + 父亲曾申请过 1979 年签证 = 双重敏感。
      处罚期间，他开始悄悄地把更多作品带回家——但他父亲劝他别再出头。
      1988 年秋，娜塔莎 24 岁，伊利亚 26 岁。
      两人在塔甘卡剧院后台的衣钩下第一次把"我们一起写一部"说出口——
      但这部未完成的作品（暂定名《开往维也纳的夜行列车》）从未被写出来。
    fixed_objective_facts:
      - 1987 年 3 月首演确实在塔甘卡剧院（Taganka Theatre）大剧场
      - 文化部"内部警告"是正式行政处分，但未公开宣布
      - 1988 年 1 月 14 日的处分通知由剧院人事科代转
      - 伊利亚 1987 年 11 月第二次申请出国签证被"待议"
      - 萨沙当时 27 岁，是青年导演，尚未与娜塔莎恋爱
      - 《这里没有童话》的现场录音被文化部没收一盘
    forbidden_reveals:
      - 1989 男主移民的具体航班与日期
      - 1993 萨沙与娜塔莎的结婚时机
      - 1992 莉莎与伊利亚在维也纳的具体相识
      - 2008 柏林重逢的场次与曲目
    motif_anchors_planted:
      - id: red_notebook_creation
        description: 伊利亚在红色笔记本里写下《开往维也纳的夜行列车》大纲三页
        object: red_notebook
      - id: tape_unposted
        description: 1987 年首演 12 场其中一盘的私录磁带被文化部没收
        object: cassette_tape
      - id: costume_hook_mark
        description: 塔甘卡剧院后台的衣钩上 1987 年被娜塔莎用指甲划了一道
        object: costume_hook_scratch

  - anchor_id: 1989_departure
    era: "1989"
    label: 1989 离别
    scene_id: scene_1989_farewell
    location: 莫斯科谢列梅捷沃机场（SVO-2 国际线）· 出境大厅
    time_window: 1989 年 4 月 8 日清晨
    macro_endpoint_locked: departure
    description: |
      1989 年 4 月 8 日清晨，伊利亚·贝尔曼与新婚妻子莉莎（指挥家助手，俄-德混血）
      在谢列梅捷沃机场 SVO-2 国际线出境大厅。
      娜塔莎没去送行——Sasha 在 1988 年底明确劝过她"别去，免得连累你"。
      萨沙陪着娜塔莎在塔甘卡剧院的衣帽间坐到早上 5:30，然后一起走到街口。
      5:55 娜塔莎接到莉莎从机场打来的电话："他要我把这句话传给你：'第三小节是给你的。'"
      6:15 伊利亚和莉莎的 Aeroflot SU-355 班机起飞。
      飞机经布拉格转机飞往维也纳。
      莉莎保留着他们 1986 年在西柏林演出时娜塔莎送的 1 块巧克力的锡纸，
      伊利亚的行李里有：红色笔记本、半份《开往维也纳的夜行列车》手稿、
      一台 1984 年产 Sony WM-FX1 walkman、和一盘他在莫斯科录的最后一段合奏磁带。
      磁带 B 面 23:14 处有娜塔莎独奏的一个大提琴长音——这就是"第三小节"。
      莉莎 1990 年把这盘磁带听过 6 次后，把它收在维也纳公寓的床头柜。
      1992 年伊利亚在维也纳与莉莎正式结婚。
    fixed_objective_facts:
      - 1989 年 4 月 8 日 SU-355 班机确实从 SVO 起飞，经 PRG 中转，到达 VIE
      - 莉莎·霍夫曼（Lisa Hoffmann）当时 22 岁，俄德混血，1986 年在西柏林室内乐节认识伊利亚
      - Aeroflot 托运标签格式："SVO  ->  PRG  ->  VIE / SU-355 / 1989-04-08"
      - 莉莎当时在维也纳音乐与表演艺术大学（MDW）读指挥硕士
      - 娜塔莎没去机场是出于自我保护（她的处分仍在 3 年观察期内）
      - 萨沙当时 28 岁，与娜塔莎尚未确定恋爱关系
    forbidden_reveals:
      - 1992 莉莎与伊利亚的婚礼具体日期
      - 1993 萨沙与娜塔莎的结婚时机
      - 1995 两人在布拉格或华沙的某次偶遇（如果有）
      - 2008 柏林重逢
    motif_anchors_planted:
      - id: aeroflot_tag
        description: Aeroflot 托运标签"SU-355 / 1989-04-08 / SVO-PRG-VIE"
        object: aeroflot_luggage_tag
      - id: walkman_and_tape
        description: 伊利亚的 Sony WM-FX1 与最后一盘合奏磁带
        objects: [sony_walkman, cassette_tape]
      - id: third_bar_dedication
        description: '第三小节是给你的 —— 伊利亚的口信由莉莎转达'
        object: oral_message_third_bar
      - id: chocolate_tin_paper
        description: 莉莎保留的 1986 西柏林巧克力的锡纸
        object: lisa_chocolate_tin_paper

  - anchor_id: 1995_two_cities
    era: "1995"
    label: 1995 离散
    scene_id: scene_1995_two_cities
    location: 莫斯科 · 高尔基公园  ->  维也纳 · 第三区公寓；横跨 1992—1995
    time_window: 1992-01 至 1995-12 的蒙太奇
    macro_endpoint_locked: marriage
    description: |
      1989 之后，6 年间两人通过零星信件和一次未完成的明信片保持联系。
      1991 年 12 月苏联解体后通讯恢复。
      1992 年 5 月，伊利亚在维也纳与莉莎登记结婚，莉莎 25 岁。
      1993 年 9 月，娜塔莎在莫斯科与萨沙登记结婚，萨沙 32 岁。
      1994 年 1 月，娜塔莎生下女儿阿尼娅（Anya），
      伊利亚与莉莎在维也纳 1995 年 4 月生下儿子马蒂亚斯（Matthias）。
      1995 年 11 月，娜塔莎带 22 个月的女儿阿尼娅去维也纳短期探亲（姐妹住在维也纳 16 区）。
      她没告诉伊利亚；莉莎也不知道。
      在维也纳的第三天，娜塔莎在国立歌剧院附近听到一段钢琴练习曲，
      回头看见是伊利亚在带学生上课——他们隔了 7 米对视 4 秒，伊利亚点头致意，
      娜塔莎推着婴儿车走开了。她把这次偶遇告诉萨沙；
      萨沙说"那很好，他看起来健康"。
      1995 年 12 月，娜塔莎回到莫斯科。
      那份 1987 年的手抄谱"Op.38 副本"一直放在她家书架的第三格，
      阿尼娅在 2 岁时曾用蜡笔在封底画了一颗歪斜的红星。
      伊利亚的红色笔记本里 1987—1995 共 8 年只增加了 11 页，
      其中第 7 页是 1992 年他与莉莎在维也纳登记后写下的"如果她问起来我怎么说"——
      这一页被他撕下来又粘回去过，粘痕仍在。
    fixed_objective_facts:
      - 1991 年 12 月 25 日苏联解体（戈尔巴乔夫辞职）
      - 1992 年 5 月 9 日伊利亚与莉莎在维也纳 1 区登记处结婚
      - 1993 年 9 月 18 日娜塔莎与萨沙在莫斯科 4 区登记处结婚
      - 1994 年 1 月 12 日阿尼娅出生
      - 1995 年 4 月 3 日马蒂亚斯出生
      - 1995 年 11 月 17 日娜塔莎在维也纳国立歌剧院偶遇伊利亚
      - 莉莎与娜塔莎在 1995 年之前从未见面
      - 两家无共同朋友
    forbidden_reveals:
      - 2008 柏林重逢的场次与曲目
      - 1996-2007 之间的任何具体事件
      - 两家孩子的具体近况
    motif_anchors_planted:
      - id: postcard_unposted
        description: 1995 年 11 月 17 日娜塔莎在维也纳写但未寄出的明信片
        object: postcard_wien_1995
      - id: notebook_1995_tear_repair
        description: 红色笔记本第 7 页"如果她问起来我怎么说"被撕下又粘回去
        object: red_notebook
      - id: daughter_crayon_star
        description: 1995 阿尼娅蜡笔画的歪斜红星
        object: manuscript_op38_cover_back

  - anchor_id: 2008_reunion
    era: "2008"
    label: 2008 重逢
    scene_id: scene_2008_reunion
    location: 柏林 · 十字山区（Kreuzberg） · 老式咖啡馆 + U1 线地铁站街口
    time_window: 2008 年 11 月某个周六傍晚
    macro_endpoint_locked: reunion
    description: |
      2008 年 11 月，伊利亚 46 岁，在柏林爱乐音乐厅（Philharmonie）
      举办肖斯塔科维奇钢琴独奏会，曲目是 Op.38 + Op.40 + Op.49。
      娜塔莎 44 岁，莫斯科国家交响乐团大提琴副首席，
      11 月这周在柏林随团演出（同一周不同音乐厅），
      萨沙这次没跟来，他在莫斯科陪 14 岁的阿尼娅准备音乐学院附中入学考试。
      莉莎这次没跟来，她在维也纳陪 13 岁的马蒂亚斯参加学校合唱团排练。
      11 月 15 日周六傍晚 18:30，独奏会结束。
      18:50 娜塔莎买了一份伊利亚的节目单（折角，标注第 2 曲目 Op.40），
      走到十字山区一家老式咖啡馆——这是 1995 年她和伊利亚在
      维也纳国立歌剧院附近那家咖啡馆的柏林分店，老板是同一人。
      19:15 伊利亚进来，没带莉莎，没带儿子。
      两人开始说话。
      桌上：两份节目单、伊利亚的红色笔记本、娜塔莎的斜挎包里那份手抄谱。
      21:00 两人走到 U1 线十字山区站街口。
      21:05 地铁红线绿灯，娜塔莎去酒店（U1  ->  U2 转 Friedrichstraße），
      伊利亚去朋友家过夜。
      两人在同一刻回头笑了一下——这是 1995 年维也纳国立歌剧院对视 4 秒的 13 年后回响。
      21:06 伊利亚打电话给莉莎："今晚云不遮德意志歌剧院的屋顶。"
      21:08 娜塔莎发短信给萨沙："我到了。今晚不回莫斯科。后天飞。"
    fixed_objective_facts:
      - 2008 年 11 月 15 日柏林爱乐确实有肖斯塔科维奇独奏会
      - 十字山区这家咖啡馆 1990 年开，老板是维也纳人
      - U1 线 Kreuzberg 站离咖啡馆步行 4 分钟
      - 莫斯科国家交响乐团 2008 年 11 月柏林巡演是已确认行程
      - 萨沙当时是塔甘卡剧院导演
      - 阿尼娅当时 14 岁，萨沙当时 47 岁
      - 莉莎当时 38 岁，马蒂亚斯当时 13 岁
    forbidden_reveals:
      - 2009 之后两家人的任何具体生活细节
      - 任何关于"下一案"的暗示
    motif_anchors_anchored:
      - id: two_programs_takeout_compare
        description: 两份肖斯塔科维奇独奏会节目单对齐（替代第一案"两张同版毕业照"）
        objects: [program_op38_2008, program_op40_2008]
