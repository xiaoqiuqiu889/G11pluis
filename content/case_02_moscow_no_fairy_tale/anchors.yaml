# =============================================================================
# 第二案 · 《莫斯科没有童话》 · 5 锚点设计
# -----------------------------------------------------------------------------
# 时代：1985—2008，苏联晚期与解体后的中欧
# 关系：俄罗斯大提琴手（女主） + 犹太裔钢琴家（男主，1989 移民维也纳）
# 母题对位（与第一案革命街同结构、不同事件/物件/声音）：
#   革命街"两张同版毕业照"   ->   本案"两份同版手抄谱"
#   革命街"诗集"             ->   本案"红色笔记本"
#   革命街"邮件"             ->   本案"未寄出的磁带"
#   革命街"未发送的我到了"    ->   本案"未寄出的明信片"
#   革命街"公交票"           ->   本案"剧院节目单（带折角）"
#   革命街"咖啡馆糖罐"       ->   本案"剧院后台的衣钩"
#   革命街"行李牌"           ->   本案"Aeroflot 托运标签"
# 宏观端点（与第一案同结构、不同事件）：
#   处分  ->  女主因《这里没有童话》被文化部"内部警告"
#   离开  ->  1989 男主犹太裔携妻移民维也纳
#   结婚  ->  女主 1993 嫁本地剧作家 Sasha；男主 1992 娶维也纳指挥助手 Lisa
#   重逢  ->  2008 柏林某次独奏会后的后台
#   路口再次分开
# 写入规范：UTF-8；YAML 1.2；不修改 schemas。
# =============================================================================

case_id: case_02_moscow_no_fairy_tale
title: 莫斯科没有童话
subtitle: 1985-2008，苏联解体前后两段音乐与一次未寄出的明信片
case_eras:
  - "1985"
  - "1987"
  - "1989"
  - "1995"
  - "2008"
macro_endpoints:
